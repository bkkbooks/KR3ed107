body:
  text: 卷二針法門猢猻癆小兒有此症求食不止終夜不睡用針刺兩手面中三指中節能曲處周歲者用中號針六七歲用大號針刺進半分許遇骨微位即拔出不可誤針筋上若疳甚無水刺數日方有白水不甚者即有白漿刺數日隨有血一指有血一指不刺二指有血停此二指不刺若六指俱有血病痊不復刺矣凡刺須隔一日俟天晴雨則無益刺後即得睡減貪饞忌棗慄干甜果物食則復發如初刺有血非此症矣挑悶疹子分開頂門內有紅筋紅瘰挑破即止喉痹覓喉上紅疙瘩用針挑破即愈百發神針治偏正頭風漏肩鶴膝寒濕氣半身不遂手足癱瘓痞塊腰痛小腸疝氣癰疽發背對口發痰核初起不破爛俱可用針按穴針之真神妙百中乳香沒藥生川附子血竭川烏草烏檀香末降香末大貝母麝香各三錢母丁香四十九粒淨蘄艾綿一兩或二兩作針消癖神火針蜈蚣一條木鱉五靈脂雄黃乳香沒藥阿魏三稜蓬朮甘草皮硝各一錢鬧羊花硫黃山甲牙皂各二錢麝香三錢甘遂五分艾絨二兩作針陰症散毒針乳香沒藥羌活獨活川烏草烏白芷細辛牙皂硫黃山甲大貝靈脂肉桂雄黃各一錢蟾酥麝香三分艾絨一兩作針灸法門醫小兒小兒目視不轉睛指甲黑作鴉聲是死形無可治惟用此法灸十灸十生將左右兩手彎處各灸一穴左右兩腳趾將第二腳趾縫頭處亦必各灸一灸將痰瀉出即回生奇妙不可言醫小兒之神灸也雞爪風婦人月家得此不時發手足及指拘攣拳縮如雞爪頗疼痛急於左右膝蓋骨下兩旁各有小窩共四穴俗謂鬼眼各灸三壯立愈乾霍亂死灸法心頭微熱者以鹽填臍內納艾灸不計數以醒為度附子灸癰疽久漏瘡口冷膿水不絕內無惡肉以大附子水浸透切大片厚三分安瘡口艾隔灸數日一灸至五六七次服內托藥自然長滿為末作餌用亦甚可黃蠟灸治癰疽等毒白麵水和成塊照毒根盤大小作圈厚一指高寸余黏肉上外以絹帛加濕布圍住將黃蠟掐薄片入面圈內以熨斗火運逼蠟化即痛則毒淺若不覺至蠟滾沸逐漸添蠟俟不可忍沃冷水候凝瘡勿痛者毒盛灸未到也不妨再灸輕三次重三四次忌房事氣惱發物灸癬日中時灸病處影上三炷灸之咒曰癬中蟲毛戎戎若欲治待日中又法八月八日日出時令病人正向東面戶內長跪平舉兩手持胸兩邊取肩頭小垂際骨宛宛中灸之兩火俱下各三壯若七壯十壯愈灸耳聾濕土瓜根削半寸塞耳內以艾灸七壯每旬一壯乃愈疝氣偏墜淨草一條量患人口兩角為一則折斷如此三則折成二角如厶字樣以一角安臍中心兩角安臍下兩旁尖盡處是穴若患在左灸右在右灸左兩邊俱患兩穴皆灸艾炷如麥粒大灸十四壯或二十一壯即安又灸兩足三陰交穴尤效灸癰疽男左女右以篾一概根前齊中指端後至手腕橫紋凹中截斷為準卻以竹一根兩頭擱起令病人騎之兩足不著地挺身正坐將前篾植於竹上以正頭植骨脊中盡處各開一寸名騎竹馬法灸七壯灸畢宜用乳香真綠豆粉為末調服之以防火氣入心胡核灸破傷風及瘋犬傷神效胡核殼半個填稠人糞滿仍用槐白皮襯扣傷處以艾灸之遍身臭汗其人大困即愈遠人者將傷處如前灸之亦愈雞子灸凡毒初起紅腫無頭雞子煮熟對劈去黃用半個合毒上以艾灸三壯即散若紅腫根盤大以鴨蛋如法灸亦可苦瓠灸擇神人不在日空心用井花水調百藥煎末一碗服之微利卻用秋壺盧一名若不老生在架上而苦者切片置瘡上灸二七壯蕭端式病此連年一灸遂愈桑木灸治癰疽發背不起發或瘀肉不腐潰及陰瘡瘰癧流注臁瘡頑瘡惡瘡久不愈俱用此灸之未潰則拔毒止痛已潰則補接陽氣亦取其通關節去風寒火性暢達出郁毒之意干桑木劈成細片扎作小把燃火吹息患處每吹片時以瘀肉腐動為度內服補托藥誠良方也碗灸治乳腫碗一個用燈草四根十排碗內頭各露寸許再用紙條一寸五分闊用水濕了蓋碗內燈草下紙與碗口齊將碗覆患處留燈草頭在外艾一大團放碗底火灸之艾盡再添至碗內流水氣內覺痛止方住甚者次日再灸一次必消灸目正月十六日用川椒末一二分入頭垢和為蠶豆大凹之似窩置於眼角別揉熟艾米粒大納凹中每眼灸七壯或九壯如此俟清明日照前後灸之連灸三年則目加精采至老不昏麻葉灸七月七日採麻花五月五日採麻葉搗作炷灸瘡上百壯次燒胡桃松脂研敷即愈熏法門鵝掌風真蘄艾四五兩將水三四碗煮五六次入大口瓶內盛之用麻布雙層縛瓶口將手心放瓶上熏之如藥冷再熏如神蜈蚣咬杉木皮或枝燒煙燻立刻止痛比蜘蛛尤妙牛皮癬水銀一錢五分芸香一錢五分大棗七枚同搗爛為四丸每夜熏一丸效口眼歪斜巴豆三粒麝香三分共研將熱水二盅藥藏盅底放手心右斜放左手心左斜放右手心久病截瘧老薑兩斤搗爛置於滾水一大桶內坐布帳中脫衣坐臥桶上熏透即愈第一禁風痘不脫靨燒乳香薰之蟲牙天仙子一撮入小口瓶內燒煙竹筒引煙入蟲孔內熏即死永不發又天仙子入瓶內熱湯淋下口含瓶口令氣熏之冷更作盡三合乃止有津涎可去甚效頭風插耳黃蠟三兩熔化以白紙闊五寸長二寸在蠟上拖勻其蘄艾揉軟薄攤蠟上卷為筒插耳內一頭火點燃煙氣透腦其痛即止左痛插右右痛插左至重不過二次喉痹蓖麻子研爛紙卷作筒燒煙燻吸即通或取油作捻尤妙名聖煙筒喉痹緊急用此即破喉症開關牙皂巴豆各等分為末米湯調刷紙上曬乾作捻子點火以煙燻鼻立能開口鼻流涕專治十八種喉閉小兒脫肛五倍子先以倍子艾絨捲成筒放便桶內以瓦盛之令病者坐桶上以火點著使煙燻入肛門其肛自上隨將白礬研末搽之其肛自緊再不復發霍亂轉筋身冷心中下微溫者硃砂二兩研蠟二兩和丸著於火籠中熏之周圍厚覆勿令煙泄兼床下著火令腹微暖良久當汗出而醒疥瘡熟蘄艾三兩木鱉子三錢雄黃二錢硫黃一錢為末揉入艾中分作四條每一條安陰陽瓦中置被裹熏後服通聖散癱瘓頑風骨節疼痛下元虛冷諸風痔漏下血一切風瘡川烏頭草烏頭兩頭尖各三錢硫黃麝香丁香各一錢木鱉子五個上為末以熟蘄艾揉軟合一處鈔底包裹熏病處名雷丸手足風痛冷痛如虎咬者樟木屑一斗流水一石煎極滾泡之乘熱安足於桶上熏之以草韉圍住勿令湯氣入目其功甚捷拳毛倒睫無名異末紙卷作捻點燈吹殺熏之睫自起破傷風口噤身強肉蓯蓉切片曬乾用一小盞底上穿穴燒煙燻患處累效咳嗽熏法熏黃一兩以蠟紙條卷作筒十枚燒煙吸菸取吐止一曰一熏惟食白粥七日後以羊肉羹補女人病邪與邪物交通自言自語悲思恍惚者雄黃一兩松脂二兩溶化以虎爪攪之丸如彈子大夜燒籠中令婦坐其上以被蒙之露頭在外不三劑自斷仍以雄黃人參五味子等分為末每旦井水服之喉閉竹紙滲巴豆令滿作紙捻點燈旋之以煙燻喉間即吐惡血而消或刺入喉間出紫血亦愈蓋咽喉病發於六腑者引手可探及刺破喉血即已若發於五臟則受毒牢深手法藥力難到惟用紙捻為第一舌脹出血蓖麻取油蘸紙捻燒煙燻之即腫脹皆消並治牛馬六畜舌脹手汗黃耆一兩葛根一兩荊芥三錢水煎湯一盆熱熏而溫洗三次即無汗熏嗽治風入肺久嗽者鵝管石雄黃鬱金款花為末和艾用姜一片置舌上以藥艾於姜上灸之取煙入喉中愈青布熏惡瘡防水青布和蠟燒煙筒中熏之入水不爛瘡傷風水用青布燒煙於器中以器口熏瘡得惡汗出則痛癢瘥臁瘡潰爛陳艾五錢雄黃二錢青布作大炷點火熏之水流數次愈支太醫桃葉熏水二石煮桃葉取七斗安床簀下厚被蓋臥床上乘熱熏之少時當雨汗汗遍去湯速粉之並灸大椎穴此法治天行病貼法門痢疾塞肚綠豆七粒胡椒七粒麝香一釐膠棗一枚共搗爛放瓶內包好患者取一丸貼臍上宜用端午日合小兒赤眼黃連為末水調敷腳心小兒熏舌又名雀舌巴豆半粒飯黏四五粒共搗為餅如黃豆大貼眉心中間待四圍起泡去之即愈收陰症傷寒雞子放臍眼內一時一換四五換即愈矣陰氣盡收於內止自汗鬱金末臥時調塗乳上截驚法芭蕉油薄荷汁煎勻塗頭頂留囟門塗四肢留手足心勿塗甚效嬰兒瘧疾代赭石五枚煅紅醋淬硃砂五分砒霜一豆大同以紙包七重打濕煨乾入麝少許為末香油調一字塗鼻上及眉心四肢神應隔皮取膿治諸般腫毒驢蹄細切一兩炒蕎麥麵一兩白鹽五錢草烏四錢去皮上為末調作餅子慢火炙黃出火毒研米醋調成膏用白紙攤貼患處毒自毛竅而出其腫自退痞塊紅芥菜子不拘多少生薑汁浸一宿大約芥菜子一酒杯加麝香一錢阿魏三錢搗爛如膏攤布上貼患處汗巾紮緊一宵貼過斷無不消牙齒疼痛輕粉一錢大蒜一瓣杵餅安膈骨前陷中先以銅錢隔了用蜆蓋定扎住一宿愈左疼安右右疼安左又左牙痛敷右大指腕上右痛敷左截瘧丹斑蝥巴豆肉硃砂各一錢麝香二分雄黃一錢半蟾酥五分黑棗三個搗丸如綠豆大貼眉心穴一周時揭下投長流水中貼臍截瘧胡椒雄精等分研末將飯研爛為丸桐子大硃砂為衣將一丸放臍中外膏藥貼之即止難產仙方蓖麻仁取白仁七個麝香三分共一處搗如泥用絹帛包之勒在臍中即時產下如倒生者用穩婆送進片時即順下如神丹治難產巴豆三粒去殼蓖麻七粒去殼麝香少許研成一餅貼臍上即產產下即去之地黃膏治眼腫立效生地一兩寒水石五錢黃連一兩為末生地汁調餅貼太陽上水瀉不止木鱉仁五個丁香五個麝香一分上研末米湯調作膏納臍中貼之外以膏藥護住痢疾噤口木鱉仁六個研泥分作二分用面燒餅一個切作兩半只用半餅作一竅納藥在內上以餅乘熱覆在病人臍上一時再換半個熱餅其痢即止遂思飲食小兒口內流涎天南一個為末醋調兩足心過夜即安然洗去牙痛蘿蔔子十四粒研末以人乳和之左痛點右鼻右痛點左鼻蒸法門癘風先將元參苦參沙參荊芥防風厚朴白芷陳皮蔓荊子威靈仙麻黃各一兩桃枝柳枝煎湯洗之換一身新單青布衣掘一地坑深尺許方廣約可臥身者用慄炭四五十斤燒坑內極熱潑滾醋數十碗次去炭鋪草韉於內令病者臥於薦上厚被蓋取汗汗出一瞬起別換衣進飲食後用五爪藤煎湯重洗數次自愈服敗毒丸藥骨蒸發熱雄黃一兩入小便一升研如粉乃取黃理石一枚方圓一尺者炭火燒之三食頃濃汁淋於石上置韉氈於上患人脫衣坐之衣被圍住勿令泄氣三五度瘥腳氣腫痛樟腦二兩烏頭三兩上為末醋和丸彈子大每置於足心踏之下以微火烘之衣被圍蓋汗出如涎為效風濕痰病人坐密室中左用滾水一盆右用炭火一盆前置一書桌書一冊先將無油新巴豆四十九粒研如泥紙壓去油分作三餅如病在左令病人將右手仰置書上安藥於掌心上以碗安藥上傾熱水碗內水涼即換良久汗出立效病右安左一云隨左右安之珊瑚蒸治中風不語脈沉口噤黃耆防風共煎湯數斛置床下蒸藥入腠理周時可瘥千金神草方治風濕癱瘓手足不仁半身不遂周身麻木或痠痛口眼歪斜並皆神效蓖麻子草秋夏用葉春冬用子俱得一二十斤木甑內置一大鍋上蒸熟取起先將綿布數尺雙摺浸入蒸葉子湯內取出乘熱敷患處卻將前葉子熱鋪布上一層候溫再換熱葉子一層如此蒸換必以患者汗出為度重者蒸五次輕者蒸二次其病自愈內以疏通活血之劑服之阮河南桃葉蒸治發汗汗不出用此蒸之可救燒地令熱去火以水少灑之布干桃葉於上厚二三寸安席葉上臥溫覆得大汗被中敷粉極燥便瘥凡柏葉麥麩蠶沙皆可如此用之蠶砂蒸治患風冷氣痹及癱瘓蓋蠶屬火性燥能勝風去濕醇酒三升拌原蠶沙五斗甑蒸於暖室中鋪油單上令患者就患處一邊臥沙上厚蓋取汗若虛人須防大熱昏悶令露頂面一次不愈間日再蒸無不效蒸腳氣服藥不效者於地上掘作盆子深六七寸可容腳用炭火燒赤然後噴釅醋遍地鋪淨蔥不去皮根在小床坐定用腳伸地盆內蒸候汗出如膠拭去忌房事不兩次必愈神效荊葉蒸治腳風濕痛不止荊葉不限多少置大甕中其下著火溫之病人置葉中須臾當汗出蒸時旋旋吃飯稍倦即止便以被蓋避風仍進蔥豉酒及豆酒亦可以瘥為度按此法止宜施之野人李仲南永賴方云治腳氣諸病用荊莖置壇中燒煙燻湧泉穴及痛處使汗出即愈此法貴賤皆可用洗法門小兒咳嗽生薑四兩煎濃湯沐浴即愈洗頭明目鳳眼草即椿樹上叢生莢也燒灰淋水洗頭經一年眼如童子加椿皮炭尤佳正月七日二月三日九月二十日十月二十三日十一月二十九日十二月十四日洗之洗癩頭蝸牛數十條洗之二次必愈水三碗煎蝸牛三十條足矣洗癰疽腫時用紫葛天蕎麥忍冬藤金絲草各等分煎湯洗潰時白芷甘草羌活黃芩露蜂房赤芍藥當歸頭先將豬前蹄一隻煮汁去油花取清汁煎藥去渣溫洗以絹拭之洗凍瘃黃柏皮硝各等分研細末已破者柏七硝三未破者紅腫柏硝各半初起者硝七柏三皆用冷水調擦俟干以熱水洗去再搽再幹再搽如此三遍一日停痛三日全愈此神方也五枝浴治大風年深不愈面毛脫鼻梁崩損不愈取效如神柳桃桑槐楮五般枝煎濃湯大缸浸坐沒頸一日俟湯如油出浴安矣楊枝浴治痘瘡數日陷頂漿滯不行或風寒所阻水楊枝葉無葉用枝五斤流水一大釜煎湯溫浴之如冷添湯良久照見累起有暈絲者漿行也如不滿再浴力弱者只洗頭面手足如屢浴不起者氣血敗矣不可再浴始出即癢塌者皆不可浴痘不行乃氣血所滯澀腠理固密或風寒外阻而然浴令暖氣透達和暢鬱蒸氣血通徹每隨暖氣而發行漿貫滿功非淺也若內服助氣血藥藉此而升之其效更速風寒亦不得而阻之矣洗青盲昔武勝軍宋仲孚患此二十年用此法二年目明如故青桑葉新研焙乾逐月按日就地燒存性每以合子磁器內煎減二分傾出澄清溫熱洗目至百度屢試有驗正月初八日二月初八日三月初六日四月初四日五月初六日六月初二日七月初七日八月二十九日九月十二日十月十三日十一月初二日十二月二十日熨法門痞積艾綿四兩捏如患大川椒四兩拌艾中粗草紙包安痞積上以湯壺熨內有響聲即消皮熨治氣痛之病忽有一處如打撲之狀不可忍走注不定靜時其處冷如霜雪此皆暴寒傷之也白酒煮楊柳白皮熨之有赤點處鑱去血妙凡諸卒痛熨之皆止吸法門還魂丹治急慢驚風吹鼻二寸蜈蚣一分麝香四兩白芷天麻更加二錢黃花子死在陰司要返家共為末吹鼻即蘇青火金針治頭風火硝一兩青黛川芎薄荷各一錢為末口含冷水用此吹鼻傷寒咳逆服藥無效雄黃三錢酒一盞煎七分乘熱嗅其氣即止水腫上氣熏黃一兩款冬花二分熟艾一分以蠟紙鋪艾灑二末於上狄管成筒燒煨咽三十口則瘥三日一劑百日斷鹽醋燒香治癆元參一斤甘松六兩上二味為末以蜜一斤和勻入瓶中封閉地中埋窨十日取出更用灰末六兩蜜六兩同入瓶更窨五日取出燒之常令聞香自愈冬月喉痹腫痛不可下藥者蛇床子燒煙於瓶中口含瓶嘴吸菸其痰自出一切咳嗽不問久近晝夜無時佛耳草五十文款冬花二百文熟地黃二兩上焙研末每用二錢於爐中燒之以筒吸菸嚥下有涎吐出兩服愈碧雲散治目赤腫脹羞明昏暗隱澀疼痛眵淚風癢鼻塞頭痛外翳扳睛諸症鵝不食草曬乾二錢青黛川芎各一錢上為細末噙水一口每以米汁搐入鼻中淚出為度頭風苦痛大蒜頭七個去皮燒紅地以蒜逐個於地上磨成膏子卻以殭蠶一兩去頭足安蒜上碗覆一夜勿令透氣只取蠶研末搐入鼻內口中含水更效石南葉散小兒誤跌或打著頭腦受驚肝系受風致瞳人不正觀東見西觀西見東石南一兩藜蘆三分瓜丁五七個上為末每吹少許入鼻一日三度內服平肝藥或加牛黃單蛾薑黃一片紅棗去核二枚巴豆三粒同搗如泥用口津調和分作二丸用絹包好線扎男左女右一握手一塞鼻蓋被出汗即愈此藥治三人如干用吐津拌勻包紮如法治之倒睫拳毛因風入脾經致使風癢不住手擦目久則赤爛拳毛入內木鱉仁捶爛以絲包作條左患塞右鼻右患塞左鼻其毛自分上下再服蟬蛻藥自愈雜法門痔瘡坐袋乳香沒藥龍骨赤石脂海螵蛸輕粉木鱉各三錢上共為末以絹盛之每日坐不必洗坐二十一日無不愈濕瘡踏袋治寒濕瘡並腳氣川椒一斤盛粗布袋中放火踏上下用火烘跣足踏其上蓋椒性熱而散加以火氣上逼寒濕自去而愈甚妙釣骨丸栗子肉上皮半兩為末鮎魚肝一個乳香二錢五分同搗為丸桐子大看骨哽遠近以線系綿裹一丸水潤吞之提線釣出也黃疸取黃扛連紙一張裁為四條筆管卷如炮竹或口上糊黏固外用黃蠟一兩鐵杓將紙筒四圍澆勻不可使蠟入內患人仰臥筒套臍上外以面作圈護定勿倒頭上點火燒至面所剪斷另換新筒看臍中有黃水如雞子餅者取出輕者四五根重者六七根取盡黃為度香櫞包法治頭風香櫞不拘新舊一枚切開鴨蛋一枚煮熟切兩半開入香櫞內每邊包在太陽上得熱即愈耳鳴塞耳烏頭燒灰石菖蒲等分為末綿裹塞之日再塞為效產婦衄血口鼻起黑氣名胃肺敗紅絲線一條本婦頂心發二根紮緊中指節效消毒燈照一切癰疽發背無名腫毒及對口諸瘡已潰未潰無不神效一二十年舊船底上石灰生青桐油調將光青布照瘡大小攤貼又用青布作捻蘸桐油點火在瘡上打碎覺癢受打不論條數灰干換貼再打知痛為度紅退毒消神效掌中取積甘遂巴豆乾薑韭子檳榔各等分上為細末收米飯為丸如彈子大用時早晨花椒湯淨手將香塗掌中次將藥擦一時便瀉欲止以冷水淨手即止大小胸中有積皆治神燈照法川椒艾葉紅棗芫荽茵陳乳香白芷梢陳香櫞安息香上共為末作紙捻熏照縮贅瘤甘草煎膏筆妝之四圍上三次乃用芫花大戟甘遂等分為末醋調別以筆妝其中勿近甘草次日縮小又以甘草膏妝小暈三次如前仍上此藥自然焦縮教醫官釣骨法鹽麩子根搗爛入鹽少許綿裹以線系定吞之牽引上下便釣出也提金散大便閉塞服藥不通者滄鹽三錢屋檐爛草節七個為末每用一錢竹筒吸入肛內一寸即通膨脹取水真輕粉二兩巴豆四兩生硫黃一錢加麝更妙同研成餅先以白帛一片鋪臍上以藥餅放外上用綿綁住約人行五六里自能瀉下黃水待至二五度除去藥溫粥補之久患隔日取日一餅可治二三十人病愈後忌飲涼水黃疸取水大鯽魚一個為背者連目鱗骨俱搗爛上加麝香三分同魚熟搗成餅再加麝香二分入居餅中間貼在臍上將荷葉二三層貼餅上用布縛不及周時出黃水即消永不再發劫腫法治水腫及腫核腫毒凡水腫脹藥未全消者甘遂末塗腹繞臍令滿內服甘草水其腫漸去若腳氣上攻結成腫核及一切腫毒用甘草甘遂末水調敷腫處即濃煎甘草汁服其腫即散頭痛生蘿蔔取自然汁入生龍腦調勻昂頭使人滴鼻孔左痛灌右右痛灌左俱痛並灌之其效如神又法蓖麻子一粒搗碎同棗肉蔥須共搗勻丸如黃豆大外用絲綿裹之納鼻孔少頃必有清涕流出即將丸藥取出其痛即愈永不再發引火法人病厥逆之症不敢用藥以此治之吳茱萸一兩為末以面半兩水調成糊以布攤成膏貼湧泉穴內則手足不逆矣又法附子一個為末米醋調成膏貼湧泉穴上然後用六味湯大劑與之火不再發衄血左鼻孔出血者以色絲扎右手中指根右孔出血扎左手中指根俱出者扎二指根溫劑種子五靈脂白芷青鹽各二錢麝香一分上為末以蕎麥湯和搓成條圈於臍上以藥入其中用艾灸之但臍內微溫即愈不過二三度
