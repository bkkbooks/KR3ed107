body:
  text: 卷三僞品門假冰片真片腦形如冰雪如假造者其性亦寒用之頗與同功往往欺人亦得高價用新磚一枚納於廁中一二月取出用新汲水洗十分淨於室中陰處下用新磚閣上用新磚蓋之待霜出冰雪收之如此數次霜盡而止用磁罐與潮腦同包取其香氣智者辨之樟冰樟腦不拘多少研細同篩過壁土拌勻攤碗內以薄荷汁灑土上又以一碗合定濕紙條固縫蒸之少時樟腦飛上碗底即成冰片腦子又用銅盆以陳壁為粉糝之卻糝樟腦一重又糝壁土如此五重以薄荷安土上再用一盆覆之黃泥封固於火上款款炙之須以意度之不可太過不及勿令走氣候冷取出則腦升於上盆如此三次可充冰片也又樟腦每一兩用黃連薄荷六錢白芷細辛四錢荊芥密蒙花二錢當歸槐花一錢以新土碗鋪冰片於底安藥在上入水半盞灑腦於上再以一碗合之糊口安火煨之待水乾取開其腦自升於上以翎掃上形似松脂可入風熱眼藥人亦多以此亂片腦不可不辨假雄黃荷葉灰頭髮灰桑木灰石灰各等分以上好石黃放灰內微煮數日取出透明即成雄黃假膽礬漆緑半斤以萆麻葉一斗許搗汁淨豬膽四個河水一大碗同煮將干入硇砂一錢五分攪勻至干為度每七兩用淨盆硝一斤一處以有嘴砂銚熔開攪勻用明礬研碎入豬膽中陰乾取出如色缺緑再換新膽如上法或牛膽又朴硝入牛膽中陰乾隔年後取其色與膽礬同其礬亦相去不遠也假胡椒用豌豆以蓼子草烏生薑三味切碎搗爛取汁浸豆蒸軟如此三度換新汁浸此用石灰末以文武火炒豆皮皺為度其味如真假乳香擇有癭松樹鋸開癭就上鑿一孔以糯米一升作飯鹽一斤拌勻再杵成糍入孔中卻以原鋸鋸下癭封之鹽泥固濟百有二十日足取出即成乳香矣假象皮膏治撲打及金刃傷血出不止者用之並收口如神蠶豆炒去殼取豆搗細和勻蠟熔為膏攤貼如神法制門法制青皮醒酒益胃消食如神青橘皮一斤浸去苦味瓤揀淨白鹽花五兩炙甘草六兩茴香四兩上以甜水一斗煮之不住攪勿令著底候水盡慢火焙乾勿令焦去甘茴只取青皮密收用烏龍膽治一切喉症喉蛾喉癰明礬末盛豬膽中風乾研末每吹一錢取涎立效白豆蔻白豆蔻一斤檀香五錢上為細末甘草膏為衣不拘時細嚼內再加片腦一錢亦為末共研法制橘紅橘紅十二兩檀香五錢白豆蔻五錢片腦一錢上為細末甘草為衣不拘時細嚼法制檳榔檳榔一斤檀香五錢白豆蔻五錢木香三錢上為細末同甘草膏為衣不拘時細嚼法制芽茶清熱化痰消食止渴芽茶一斤檀香五錢白豆蔻五錢片腦一錢上為細末同甘草膏為衣不拘時細嚼香茶芽茶二兩麝香一分硼砂五分兒茶末一兩訶子肉二錢五分上共研末甘草湯為丸為片任意並治痰火症及口臭口乾生瘡皆驗又孩兒茶木樨花各一兩曬乾焙研薄荷葉曬研一兩硼砂去腳五錢上為末用甘草膏和藥作小片噙咽法制枳實治消脹滿逆氣除胸脅痰癖枳實一斤檀香五錢片腦一錢上為末同甘草膏為衣隨時細嚼法制人參補益元氣輕身延年人參檀香白豆蔻片腦上為末甘草膏為衣不拘時細嚼法制桃仁闢瘴癘山居尤宜服之桃仁一斤吳茱萸青鹽各四兩上共炒熟以新瓶密封七日取出揀去茱鹽將桃仁去皮尖每嚼一二十枚造櫻珠好南參不拘多少碾為細末以胡桃仁松子同研和勻煉蜜丸如櫻子大每粒辰砂為衣取紅色二顆沸湯點服三奇曲白麵十斤蒼耳草自然汁三升野蓼自然汁四升青蒿自然汁三升杏仁四升去皮尖赤小豆三升煮爛連汁研三伏內上寅日將藥汁拌麵如造麴法曬乾收用甲寅戊寅庚寅乃三奇日也此日修合故名三奇神麯大有神效藥品門靈砂用新鍋安逍遙爐火蜜揩鍋底文武火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待永不見星取出細研盛入水火鼎內鹽泥固濟下以自然火升之干水十二盞為度取出如有針紋者成矣紫雪療傷寒溫瘧一切積熱狂易叫走瘴疫毒癘卒死腳氣五尸五疰心腹諸痰疴刺切痛解諸熱邪毒熱發黃蠱毒鬼魅野熱毒及小兒驚癇黃金一錢石膏寒水石磁石各三斤搗碎上以水一斛煮四斗去渣入犀角屑羚羊角青木香沉香各五兩甘草炒一兩丁香一兩入前汁中煮取一斗五升去渣入煉朴一斤消石二斤於藥汁中微火煎之柳木不住攪至水氣欲盡傾木盆中待欲凝入麝香一兩二錢五分硃砂二兩攪勻收之每服一二錢潦水服臨時加減甚者一兩紅雪治風熱消宿食解酒毒開三焦利五臟除熱破積滯治傷寒狂躁胃爛發斑濕瘴腳氣黃疸頭痛目昏口鼻瘡喉痹重舌腸癰等症川朴硝十斤去渣羚羊角屑黃芩升麻各三兩人參赤芍檳榔枳殼麩炒生甘草淡竹葉木香各二兩木通梔子葛根桑皮大青藍葉各一兩五錢蘇枋木六兩並銼片水二斗五升煎九升去渣濾過煎沸下硝不住手攪待水氣將盡傾入器內欲凝下硃砂一兩麝香五錢經宿成雪每服一二錢新汲水下欲速行則熱湯化服一兩碧雪治一切積熱天行時病發狂昏憒或咽喉腫塞口舌生瘡心煩大小便不通胃火諸病朴硝芒硝牙硝硝石石膏水飛寒水石水飛石各一斤以甘草一斤煎水五升諸藥同煎不住手攪令消溶得所入青黛一斤和勻傾盆內經宿結成雪為末每含咽或吹之或水調服二三錢欲通利熱水服一兩消石石脾芒硝朴硝各一斤上為末以苦參水二斗銅鐺煎十沸入三物煮減半去渣煎著器中冷水漬一夜即成消石可化諸石為水石脾白礬戎鹽各一斤上為末以苦參水一斗鐺中煮五沸下二物煎減半去滓熬干白如雪礬石新桑合槃子一具於密室掃淨以燒地令熱灑水於上或灑苦酒於上而布白礬於地上以槃覆之四面以灰擁一日夜其石精皆飛於槃上掃取收上未盡者更如前法數遍乃止可作飲食飛黃治緩疽惡瘡蝕惡肉瓦盆一個安雌黃於中丹砂居南磁石居北曾青居東白石英居西礬居上石膏次之鍾乳居下雄黃覆之雲母布於下各二兩為末以一盆蓋之羊毛泥固濟作三隅灶以陳葦燒一日取其飛黃用之土黃信石一兩硇砂二錢木鱉子肉巴豆肉各五錢上以信石硇砂研末以木鱉巴豆搗成膏入石腦油和作一塊油紙數重包裹埋於土坑內四十九日取出磁器收貯待用如無石腦油亦可元霜治痰火神水黑鉛一斤煬一薄餅中穿一孔以繩系之將好米醋約寸許甕口用皮紙箬於扎緊再以磚石壓之勿泄氣放屋下陰處待數日取起鉛餅上有白霜拭下每鉛一斤取霜二兩為止治噎膈每服五分噙口內以白湯送下治痰火咳嗽每服三分照前法服取緑豆油治天疱瘡緑豆裝入粗瓦瓶內以毛竹箸一把塞緊瓶口再用瓦盆一個底下鑿一孔將瓶倒插於盆孔內用礱糠炭屑燒之其油即在箸頭滴出以碗收之俟出火毒用油抹點瘡上二三次愈油胭脂治手足開裂生豬油去筋膜一兩入鍋熬淨再入黃占五錢白占三錢同化清入銀硃黃丹各五分攪勻以軟能攤開為妙敷之愈雲母粉治百病雲母一斤拆開揉入火瓶築實上澆水銀一兩封固以十斤頂火煅赤取出卻拌香蔥紫連翹二件令搗如泥後以尖絹袋盛於大水盆內搖取粉余渣未盡再添藥草重搗取粉以水盤一面於灰上印一淺坑鋪紙傾粉在內候乾焙之以麵糊丸梧子大遇有病者無不效耿砂汞磁瓶盛硃砂不計多少以紙封口香湯煮一伏時取入水火鼎內炭塞口鐵盤蓋定鑿地一孔放碗一個盛水連盤覆鼎於碗上鹽泥固縫周圍加火煅之待冷取出汞自流入碗矣造海石苦瓜蔞去皮搗碎連汁用煅過黃口蛤蜊粉拌勻作餅曬乾入藥用有等庸醫以海浮石作海石誤矣此藥最能去痰取草汞細葉馬齒莧干之十斤得水銀八兩或十兩先以槐木捶之向東作架曬之二三日即干如經年久燒存性盛瓦甕內封口埋土坑中四十九日取出自成矣鼻烟香白芷二分細辛八分豬牙皂角各二分以上焙乾研薄荷二分研冰片三釐干烟絲一錢為君干烟絲必配福建煙六七分許上各為末酌量配合不拘分量色如棕者佳雞子雄黃雄黃一斤研細取新生雞子黃白和之置銅銚中以蓋覆之封固勿令出氣微火蓋上容得手不用太熱三日夜勿令火絶寒乃起之掠去上柦清者在下當湧湧如水銀寒則堅得人氣復軟煉一片得十兩盛以竹筒勿使見風服丸如麻子大使人肌膚潤澤冬則能溫夏則能涼闢除寒氣水銀霜水銀十兩硫黃十兩各以一鐺熬之銀熟黃消急傾為一鐺少緩即不相入仍急攪之良久硫成灰銀不見乃下伏龍肝末十兩鹽末一兩攪之別以鹽末鋪鐺底一分入藥在內又以鹽末蓋面一分以瓦盆覆之鹽土和泥塗縫炭火煅一伏時先文後武開盆拭下凡一轉後舊土為四分以一分和霜入鹽末二兩如前法飛之又以土一分鹽末二兩和飛如前凡四轉土盡更用新土如此七轉乃成霜用之按水銀霜即粉霜本以汞粉轉升而成故名此乃崔氏法後人罕知者大玉容丹去雀斑痱瘰如神敷面如玉白殭蠶三錢白丁香一錢五分白附子三錢白芷三錢山奈三錢滑石五錢硼砂三錢白荷花瓣三錢密陀僧三錢白茉莉子研粉三錢緑豆粉二兩白冬瓜子三錢曬研白蜜一兩五錢為丸石菖蒲酒治三十六種瘋悉效菖蒲三斤薄切日內曬乾以絹囊盛之好酒一罈懸囊在內封閉一百日取視之如緑菜色以一升熟黍米納中十四日開出飲酒代茶湯夏月服之代茶健脾止渴白朮一錢五分麥冬去心一錢煎作湯服少陽丹蒼朮乃天之精也用米泔水浸半日刮去黑粗皮曬乾搗碎羅為細末一斤地骨皮乃地之精也新掘者以溫水洗淨用槌打扁去心止取嫩皮曬乾搗碎羅為細末一斤桑椹乃人之精也用黑熟者二十斤入瓷盆內以手搓揉揣爛入絹袋內壓汁去渣將前二味投入椹汁內調為稀糊傾入瓷罐內封口置淨棚上晝採日精夜採月精專待日月自然火煎乾為度搗羅為細末煉蜜丸赤小豆大每服十丸無灰酒下日進一二服三年發白返黑面如童子蓋此藥總合恐陰雨損壞必須旋合旋曬一二日就干採日月精華四十九日從新為末如法丸用縱使總合亦須用十數大盤分開曬一二日就干免致雨壞固齒延壽膏齒槁黃黑腐敗風蟲作痛腮頰紅腫大有奇功久貼堅固牙齒驅逐垢膩益腎氣長養精液壯骨強髓添精倍力珍珠五錢絹袋盛之豆腐一方中作一小孔將珠入孔內以原豆腐蓋之放鍋內用綿懸鍋上不可落底桑柴火煮一炷香為度聽用雄鼠骨五錢臘月內雄鼠一隻以面作餅將鼠皮肉包裹在內外用鹽泥復包陰乾火燒紅為度冷定打破取骨收之聽用大小皂角五分細辛三分水洗曬乾青鹽三錢五分香白芷五分秋石三錢破故紙炒香淨五分忌鐵器龍骨麵裹外以鹽泥復包陰乾放入火燒紅冷定取骨用五錢鹿角霜制五錢沉香廣木香各二錢半南川芎乳香沒藥白芷歸身各一錢懷慶熟地煮二錢陽起石象牙末白蠟各五錢上各研細末俱作二分用蜜煎罐一個先將白蠟化開次後下一分藥面桑柴文火溶開蠟將藥攪勻外用呈文紙二張將前藥一分散在紙上用手擦磨藥面在紙上下周圍後將罐內藥化開攪勻傾在紙上用尉斗文火尉化上下周圍俱用藥汁走到切條臨臥貼在牙上一夜明日清晨將藥條取出其條就黑牙齒堅固齒藥此方出西域蓮花峰神傳仙方向有碑刻今已斷碎無存歌曰豬牙皂角及生薑西國升麻熟地黃木津旱蓮楒角子細辛荷葉剪荷花葉心子用要相當上以青鹽等分同燒煅研細使最良揩齒固牙須鬢黑誰知世上有仙方屠蘇酒赤木桂心七錢五分防風一兩菝葜五錢蜀椒桔梗大黃各五錢五分烏頭二錢五分赤小豆十四枚上以三角絳囊盛之除夜懸井底元旦取出置酒中煎數沸舉家東向從少至長次第飲之藥渣投井中歲飲此水一世無病又方大黃一錢六分桔梗去蘆川椒去核各一錢五分白朮桂心各一錢八分烏頭去皮尖一錢吳茱萸一錢二分防風去蘆一兩上為咀片絳囊盛懸井中或水缸中除夕制元旦寅時取出以無灰酒煎四五沸取飲自幼至長造礬華礬精法新桑合槃子一具於密室中掃淨以火燒地令熱灑水於上或灑苦酒於上乃布白礬於地上以槃覆之四面以灰擁定一日夜其石精皆飛於槃上掃取收上未盡者如前法數遍乃止為礬精若欲作水即以掃下礬精一斤納三年苦酒一斗中漬之號曰礬華百日彌佳若急欲用七日亦可食品門茶松白糖一斤南薄荷末一兩北細辛三錢芽茶末二兩拌勻任用或加麝香少許醉茯苓華山挺子茯苓削如棗大方塊安新甕內好酒浸之紙封一重百日乃開其色當如餳糖可食一塊一日至百日肥體潤澤一年可夜視物久之腸化為筋延年耐老面若童顏茯苓酥白茯苓三十斤去皮薄切曝乾蒸之以湯淋去苦味淋之不止其汁當甜乃曝乾篩末用酒三石蜜三升相和置甕攪之百匝密封勿泄氣冬五十日夏二十五日酥自浮出酒上掠去其味極甘美作掌大塊空室中陰乾色赤如棗飢時食一枚酒送之終日不食名神仙度世云絡索米治脾胃虛弱不思飲食食下不化病似反胃膈噎清明日取柳枝一大把熬湯煮小米作飯面灑成珠子曬乾袋懸風處每用滾水隨意下米米沉住火少時米浮取看無硬心則熟可頓食之久則面散不黏矣香橙湯寬中快氣消酒橙皮二斤切片生薑五兩切焙爛入炙甘草末一兩檀香末半兩和勻作小餅沸湯入鹽送下逡巡酒補虛益氣去一切風痹濕氣久服益壽耐老好顏色三月三日收桃花三兩三錢五月五日收馬蘭花五兩五錢六月六日收脂麻花六兩六錢九月九日收黃甘菊花九兩九錢陰乾十二月八日取臘水三斗待春分取桃仁四十九枚好者去皮尖白麵十斤同前花和作曲紙包四十九日用時白水一瓶曲一塊封良久成矣如淡再造一丸仙人糧治虛勞絶傷年老衰損偏枯不遂風濕不仁冷痹惡瘡癰疽等症臞仙神隱云用干天冬十斤杏仁一斤搗末蜜漬每服方寸匕補中益氣瓜蔞粉治消渴飲水大瓜蔞根去皮寸切水浸五日逐日易水取出搗研濾過澄粉曬乾每服方寸匕水化下日三服亦可入粥及乳酪中食之瓊玉膏常服開心益智發白返黑齒落更生辟穀延年治癰疽癆瘵咳嗽吐血等症生地黃十六斤取汁人參末一斤半白茯苓末三斤白沙蜜十斤濾淨拌勻入瓶內箬封安砂鍋中桑柴火煮三日夜再換蠟紙重封浸井底一夜取起再煮一伏時每以白湯或酒點服一匙糟川芎大川芎一個入舊糟內藏一月取焙入細辛同研末擦牙止瘧果大荸薺將好燒酒自春浸至秋間如瘧至不貪飲食食則脹滿不下者每日服荸薺兩個三日愈三仙酒治腎虛精冷之症燒酒一罈十斤入龍眼肉一斤桂花四兩白糖八兩將泥封固愈久愈佳金棗仙方治水蠱腫脹紅牙大戟一斤紅棗三斤水煮一日夜去戟用棗曬乾食之立消藥梅治痢疾木香木通黃芩紫蘇砂仁薄荷各一斤青梅十斤火酒十斤端午日入瓶內封固一月可用只吃兩個即愈養元散粳米一升水浸一宿瀝乾燥慢火炒令極熟磨細羅如飛面將蓮肉去心三兩懷山藥二兩芡實三兩碾米入粉內每日清晨用一盞再入白糖二匙或黃沙糖亦可用滾水調食其味甚佳久服不厭龍液膏堅白茯苓去粗皮焙乾為末擇取上好溪流水浸去筋膜渣滓淨後焙乾置磁甕中和以真蜂蜜頓調釜中水煮一日火用桑柴水及藥罐之半不可沒肩製成空心白滾湯服煩郁燥渴一切下部諸疾可除川芎茶治大人小兒感冒風寒頭疼鼻塞遍身拘急惡寒發熱等症鮮川芎梗葉切碎如無干者亦可生薑切絲陳皮切絲鮮紫蘇梗葉切碎各等分細茶與藥相對五月五日午時拌勻用盒蓋過宿使氣透次日取出焙乾磁瓶收貯用時以湯泡之一盅乘熱熏鼻吸其氣復乘熱飲之汗出即愈五香鴨治胃口寒痛手按之而稍止者是人參一兩白朮一兩肉桂一錢肥鴨一隻將藥入鴨腹中煮之極爛外以五味和之蔥椒俱不忌更以腐皮同煮恣其飽餐食盡如不能盡亦聽之不必再食米飯也一餐而痛如失矣蓮花肚治脾寒而痛痛在心之下左右也肚子一個蓮肉一兩紅棗一兩肉桂一錢小茴香三錢白糯米一合未入藥之前照常將豬肚子洗去穢氣入藥煮爛一氣頓食蘸甜醬醬油食之如未飽再用飯壓之而痛如失肚子入藥之後必須用麻線將口外扎緊清水煮之香鰻治癆蟲肥鰻二斤白薇一兩小茴香三錢甘草一錢苡仁五錢棐子十個去殼同入砂鍋內用水煮爛加五味和之乘肥飽食一頓以食盡為度半日不可用茶凡有癆蟲盡皆死矣藥肺治患疾病久不愈者豬肺一個蘿蔔子五錢研碎白芥子一兩研碎五味調和飯鍋蒸熟飯食頓食之一個即愈長壽粉治癆瘵症芡實八兩苡仁八兩山藥三斤糯米一斤人參三兩茯苓三兩蓮子半斤白糖各為末每日調服一兩如不欲調服以水打成丸如元宵服上下午服最妙九仙王道糕養神扶元健脾胃進飲食補虛損生肌肉除濕熱蓮肉四兩麥芽炒白扁豆炒芡實各二錢山藥炒白茯苓苡仁各四兩柿霜一兩白糖二十兩上為末入粳米粉五升蒸糕曬乾任意食米飲下三仙糕治內傷脾胃虛弱飲食不進主補養元氣人參山藥白茯苓蓮肉芡實各五兩白蜜砂糖屑各一斤糯米粉三升粳米粉三升上為末拌勻蒸糕曬乾再為末每取一大匙白湯調下日三四次桂漿渴水夏月飲之解煩渴益氣消痰桂末十九兩白蜜一升上以水三斗煎取一斗入新磁瓶中乃下二物打二三百轉先以油紙一重加二重封之每日去紙一重七日開之氣味香美格韻極高令人多作之八仙茶延壽固腎種子歌曰仙家別有一種茶盡是青龍白虎芽北海嬰兒能種造南山玉女採精華杜仲制四兩麩皮炒斷絲菟絲子二兩酒浸制如常五錢木鱉子去油皮十個甘草二兩去皮蜜炙廣木香一兩不見火小茴香五錢母丁香大者十個附子一個用蕎麥麵一撮包煨良久去面沉香八錢訶子四兩去殼荔枝子去皮十四個鎖陽三錢炙青鹽八錢熟地二兩三錢酒浸一夜去皮六安茶二斤上藥與茶各為細末用甘草膏以火日修合將蒸籠一扇鋪絹一層將藥平攤於絹上又放絹一層將茶一層再放蒸籠一扇鋪絹一層照前攤藥並盡蓋之周圍用紙封固慢火蒸一枝香取起乘熱為丸如芡子大入磁罐收貯以黃蠟封口埋地下一尺七寸取起每服一丸噙化無子者用之更妙即如血衰發白每日銜化一丸滿百日白髮返黑矣久服能除百病善化痰切忌敗血諸物腦三白酒莫服用品門螢火丹螢火鬼箭羽蒺藜各一兩雄黃雌黃各二兩羖羊角煅一兩半上俱為末以雞子黃丹雄雞冠一具和搗於下丸如杏仁作三角絳囊盛五丸帶於左臂上從軍繫腰中居家掛戶上甚闢盜賊五色蟾墨雄黃銀硃膽礬粉藤黃銅緑硼砂各一兩麝香一錢上共為末蟾酥為條如筆管大陰乾磨塗患處立消烏須鉛梳鉛十兩錫三兩婆羅子三個針砂熟地各半兩茜根胡桃皮各一兩沒石子黎勒皮硫黃石榴皮磁石皂礬烏麻油各二錢半為末上先將鉛錫入末一半柳木攪勻傾入梳模子印成修齒余末同水煮梳三日三夜水耗加之取出故帛重包五日每以熱皮襯手搓一百下先須以皂莢水洗淨紫霞杯硫黃袋盛懸罐內以紫背浮萍同水煮數十沸取出喉干研末十兩珍珠乳香琥珀雄黃礁砂陽起石赤石脂片腦紫粉白芷甘松山奈木香血竭沒藥韶腦安息香各二錢麝香七分金箔二十片為末入銅杓中慢火熔化以好樣酒杯一個周圍以粉紙包裹傾硫黃入內旋轉令勻投冷水中取出每旦盛酒飲二三杯百病皆消香肥皂肥皂一斤紅甘松末山奈末北細辛末各二錢潮腦一錢紅棗二兩先將肥皂去子脰研爛如泥加藥末搗成為丸灌頂油治腦中熱毒除自中翳障鎮心明目此大食國胡商方生油二斤故鐵鏵五兩硝石五錢寒水石一兩馬牙硝五錢曾青一兩綿裹入油中浸七日每一錢頂上摩之及滴少許入鼻為妙烏頭麝香油香油二斤柏油二兩另放訶子皮一兩五錢沒石子六個五倍子石榴皮旱蓮苔各三錢真膽礬一錢豬膽二個另放川百藥煎三兩上共為末先將香油熬數沸然後將藥末入油鍋內同熬少時傾出油入罐內盛微溫入柏油攪入豬膽又攪令極冷入零陵香藿香葉白芷甘松各三錢麝香一錢再攪勻用厚紙封罐口每日早午時晚各攪一次仍封之如此十日後先晚洗頭髮淨次早擦之不待數日黑紺光澤香滑永不染塵垢不須再洗用之後自見也黃髮亦黑旱蓮苔隨處有科生一二尺高小如菊折斷有黑汁名猢猻頭八白散金國宮女洗面方白丁香白殭蠶白附子白牽牛白茯苓白蒺藜白芷白及上八味研入皂角三定皮用大豆少許為末常用香身丸治遍身熾氣惡氣及口齒氣丁香一兩五錢藿香葉零陵香甘松各三兩香附子白芷當歸桂心檳榔益智仁各一兩麝香五錢白豆蔻上為末極細煉蜜為劑杵千下如桐子大每噙化五丸常覺口香五日身香十日衣香二十日他人皆得聞香也七佛虎頭圓闢瘟殺鬼除一切疫氣虎頭骨硃砂雄黃各一兩半鬼臼皂角雌黃各一兩上為末熔蠟和丸如彈子大以紅絹袋盛一丸係臂上男左女右又懸四角如值近境疫作晦朔夜半各家當燒一丸晨起各人吞下小豆大一丸則不致傳染女廉丸五月五日七月七日取山林柏木鋸板作枕長一尺三寸高四寸以柏心赤者為之蓋厚四五分工制精密勿令走氣又可啓閉蓋上鑽米孔三行每行四十九孔凡一百四十七孔內實藥二十四品按二十四氣用川芎當歸白芷辛夷白朮藁本木蘭蜀椒官桂杜蘅柏實秦艽乾薑防風人參桔梗白薇荊實䕷蕪白蘅飛蠊薏苡款花肉蓯蓉加外八味毒者以應八氣風烏頭附子藜蘆皂角𦱌草礬半夏細辛上共三十二物各五錢為末和入枕匣外用布囊縫好枕百日過面有光澤一年體中風疾一切皆愈而且身香四年發白變黑齒落更生耳目聰明神方祕驗此方乃女廉傳玉清玉清傳廣成子聖聖相傳不可輕忽常以袱包蓋勿出氣蚊煙法粗茶一斤木鱉八兩雄黃四兩上共為末醋丸彈子大每晚用一丸燒之去者去不去者亦不齧人雜品門一枝梅硃砂三錢銀硃一錢五分五靈脂三錢麝香三分萆麻仁五分雄黃五錢巴豆仁五錢不去油午日午時用脂油為膏作小餅大遇有重症先將此藥貼眉心正中移時揭去有紅色散漫者可治若白色者不可治矣七聖紫金錠治疔瘡瘴氣時毒等症上木香苦花子仙人薯晚蠶沙柏花各一錢硃砂雄黃各三錢上為末米糊為丸毛屎梯根磨水化下紫金錠治小兒一切危症各照引磨服辰砂膽星各五錢蟬殼甘草各三錢麝香一錢蛇含石四兩一方加殭蠶白附子各四錢白茯苓白朮各四錢一方加白蠶三錢白附子五錢減去甘草一錢為細末飯搗丸每錠重五分雞子丹久服長生延年取雞雌雄純白者別養得其卵扣出黃白取丹砂和入卵蠟封其口還令白雞同子抱之待雞出藥成和以早服如黃豆大日二三丸雁腹丹除萬病延年丹砂三斤沿下篩盛以重練囊納雁腹中縫腹令合蒸黍下炊以桑薪三日三夜出以白蜜丸如黃豆大每服二丸日三次觀音救苦丹硫黃一錢硝一分麝香一分上共為細末先將硫熔化後下硝麝攪勻傾銅盆攤極薄片切作米粒米大放患處點火灸之毒大者五粒小者二三粒十香丸乳香沒藥花椒硫黃各一錢水銀三錢用唾研如泥麝香三分蛇床子炒五錢大楓子去殼二兩上共研碎舊臼油燭或油胡桃作丸擦疥瘡神效神妙痧藥北細辛三兩荊芥六錢降香末三錢鬱金一錢上共為末每用一茶匙放舌冷茶送下或津咽下痧藥白胡椒一兩牙皂一錢火硝檀香末明礬丁香蟾酥各三錢北細辛二錢冰片麝香各五分金箔量加望梅丸能生津止渴旅行帶之每含一丸可代茶鹽梅四兩麥冬去心薄荷去梗柿霜細茶各一兩蘇葉去梗五錢上為細末白霜糖四兩共搗為丸如雞豆大加參一兩更妙軟腳散歌曰軟腳散中芎芷防細辛四味研如霜輕撒鞋中行遠道足無針泡汗皆香防風白芷各五錢川芎細辛各二錢半行遠者撒少許於鞋內步履輕便不生針泡足汗皆香火龍丹即痧藥牛黃一錢麝香二錢冰片一錢硃砂二兩研飛蓽茇一錢真金箔五張雄黃三兩研火硝一兩硼砂五錢牙皂一錢上各研細端午午時合如遇痧脹腹痛將此藥嗅鼻並放舌尖上咽下亦可蟾酥丸雄黃三錢麝香三分木香一錢俱不可見火加蒼朮三錢蟾酥為丸如小米大硃砂為衣如難丸少加米飲每用二三丸放舌尖上化下加入西牛黃金箔端午午時合尤妙又方沉香銼細母丁香硃砂水飛雄黃各五錢麝香三錢廣木香一兩蒼朮茅山者米泔浸去毛淨末二兩蟾酥三錢上藥俱忌見火為細末將火酒化蟾酥為丸不就加米飲丸如米大每服二三丸放舌尖上化下白梅丸生津止渴白糖三斤白鹽梅一斤去核薄荷葉一兩檀香六錢上為細末滴水丸芡實大每服一丸不拘時噙化梅蘇丸生津止渴白糖二斤烏梅肉二斤紫蘇葉二兩炒鹽一錢五分上為細末滴水丸芡子大每服一丸不拘時含化龍腦雞酥丸消渴涼上膈除邪熱止咳嗽吐血鼻血胃熱口舌痛肺虛氣損失聲並治之銀柴胡阿膠炒成珠蒲黃炒人參木通各二兩生地黃六兩麥冬四兩炙甘草一兩半黃耆一兩薄荷葉一斤上為末蜜丸芡子大每服一丸食後噙化參杏膏止咳嗽化痰人參款冬花訶子貝母五味子桑白皮紫菀杏仁阿膠茯苓甘草各五錢上為末煉蜜為丸如芡實大每服一丸不拘時含化上清丸利咽膈清上焦熱口生瘡薄荷防風桔梗各二兩川芎砂仁甘草各一兩片腦一錢上為末蜜丸芡子大每服一丸含化玉泉丸鹽霜梅肉一兩乾葛桔梗薄荷各二兩訶子烏疊泥元參各五錢天花粉三錢上為細末蜜丸黃豆大每服一丸不拘時含化太倉丸治脾胃飢飽不時生病及諸般積聚百物所傷陳倉米四兩巴豆二十一粒去皮同炒至米香至豆黑勿令米焦去豆入橘皮去白四兩為末糊丸梧子大每薑湯服五丸日二服
