body:
  text: 卷四醫禽門鶴脛折斷鶴脛至脆易折若犯此者宜用青竹比脛略大長三四寸手擘兩半片地上掘白頸蚯蚓數條去泥土鋪青竹管中用線扎定仍用數條啖之候飯頃即如舊此萬金不易之方也鶴病飼蛇鼠及大麥煮喂之南禽發風如鸚哥八哥白鷳錦雞孔雀之屬發風不食尾尖上有小肉珠圓如豆大以針挑破即愈金雀凡新捕到金雀必欲以水洗其足令十分乾淨卻以舌於其頂上順舔之數十條然後置籠中如此永不死否則必至於死此妙法也鴿病古牆中螺螄槁殼並續隨子銀杏搗為丸每飼十丸愈鴿性嗜豆緑豆性冷多食則病受煙火之氣則病不見陽光則病不獲沐浴則病不得沙石則病熱病作喘冷病下稀熱療以鹽冷療以甘草孔雀病飼以鐵水即愈如盛夏患眼病以鵝翎筒管灌青油少許清水洗之眼不開擘口啖小魚蝦及切蒻少許啖之晾冷勿與咸醋雜食鸚鵡病鸚鵡性最畏寒冷則發顫如瘴而殂飼以余甘可解畫眉病畫眉春令正當分對之時若入籠一年可矣即明春照前分對之時食不能食叫不能叫名發氤籠內取出尾上驗尖擠出白漿過數日叫口如前仍然搧打凡鳥喉啞用銅末一撮或古老錢或訶子任用一件入水汁內浸之飲其水聲響如前鷂子病鷂子有病而不知何病宜用蜂蜜奶子油及鮮熟肉或小雞肉尤妙三樣和勻與食則愈鷂子或在手腕或在棲木屢次氣喘憂悶少食鮮肉後出糞黑臭因腹內有臭液或食惡肉或食野藥之故用毛齒莧略搗爛並奶子油羊羔肉和為食又方葡萄汁煎三分去二止留一分最甜者與鴿子飲間一日將此鴿給鷂子食之則愈凡瘦而憂悶及毛豎起者此方食之獲痊凡試鷂子有病與否先置鷂子於足下後持肉高懸引教飛上撲食則無病否則有病或以銅末錢末拌肉與食如食則五臟不佳又宰羔羊肺帶熱與食肺而盡則無病食之不安難化第二日有憂悶狀則有病一出糞不間斷不捆在架上安平嘴抹內翅自下而上其翅如擦油光潤大腿均平翅內兩脈平和以上皆無病之徵或國外熱而口開舌頭喘氣或因內熱而眼閉腳一伸一縮毛豎起或因勞倦而口閉翅下垂鼻中呼氣一切皆有病之徵若出糞緑色在架拳曲不起乃死之徵也了哥病春月羽毛上生蟲多蛀死吳茱萸煎湯放令浴之蛀蟲即死黃頭病有拔肚毛者蛇殼焙燥研細拌粉內食之即愈雞一切病真麻油灌之雞瘦土硫黃研細拌食則肥雞瘟磨鐵漿染米與食則愈雞水眼白礬敷之雞哮芒硝一小塊如指大灌之即愈鵪鶉病白膜閉眼者名水眼不治則瞎須常常看視若有此病飼以蚯蚓便愈後又飼以蜘蛛蒼蠅土蜂等物敗其餘毒而鬥亦多狠雞瘟巴豆一粒搗碎香油調灌入口即愈又方緑豆粉水和成條喂數次愈醫獸門馬證熱蟲嗓黑汁鼻有膿啌喘水草不進黃瓜蔞根貝母小青桔梗吳藍靛花桃仁大黃白鮮皮黃芩鬱金各二兩馬牙硝黃柏各四兩上研末驗患相當及常要啖重者藥三兩地黃半斤豆豉二合蔓青油四合合齊前藥啖之至晚飼大效蟲嗓重者用葶藶子合令紫色搗如泥桑白皮一大握大棗二十枚去核以水二升煮取一升去滓入葶藶末調勻適寒溫而灌之隔日再灌重者不過三次若蟲嗓馬鼻沫出梁腫出起者不治蟲嗓十年者醬清如膽汁者半合分兩服灌鼻內每灌一兩日將息不得連灌即損馬也急黃黑汗右割取上斷訖取舊靴頭皮水浸汁灌之如不效用大黃當歸各一兩鹽半盞以水三盞煎取半盞分兩服灌之如再不效針破馬尾尖出血即效起臥胞轉及腸結細辛防風芍藥各一兩鹽一盞水五盞取半盞分二服灌後灌前用芒硝鬱金寒水石大青各一兩水五盞煎半以酒油各半盞攪勻分二服灌口中妙胞轉欲死小兒尿和水灌之立瘥搗蒜納小便孔中深五寸亦可頰骨脹羊蹄跟四十九個燒灰尉骨上冷換之如無鬥蹄跟楊枝指大者炙尉之後跨冷跋蔥姜各五兩水五盞煮取半盞和酒灌之治馬蛆蹄槽下立處掘一尺方埋雞子許大石子令常立石子上一二日即瘥騎馬走上阪用木於腹來去刮擦以手納後孔令探糞出即愈探法剪去手指甲以油塗手恐傷破馬腸治疥黃豆炒焦用生麻油搗爛敷之先以酣泔水洗淨又方先以皂莢水或米泔淨洗次用樗根末和麻油塗令中間少空放蟲不得多塗恐瘡大又方巴豆膩粉研細末麻油塗定日洗塗數次妙目暈用霜後干谷樹葉為末一日兩度以蘆管吹眼中治啌喘毛焦大麻子油揀淨一升飼之大效諸瘡昆沙夜合花葉黃丹乾薑檳榔五倍子為末先用鹽漿水洗瘡後用麻油加輕粉調敷疥癩杜蘅生搗擦或為末敷之亦可又方生胡麻葉搗汁灌之又方藜藿末水調塗妙鼻內癩病蕎麥磨粉灌仍用麥杆飼之傷水先燒人亂髮熏兩鼻後用川烏白芷胡椒豬牙皂角各等分麝香少許為末用竹筒盛葉一字吹入鼻須臾打嚏清水流出即效加瓜蒂兼治一切中結病症馬瘦狗肉汁灌之諸病白鳳仙花連根葉熬膏遇馬有病抹眼四角上汗出即愈馬後抽破馬尾後抽為抽轡方破者以蛇蛻燒灰香油調敷或干糝一二時即愈發汗散治騾馬久咳不止川芎陳皮青皮紫蘇百合當歸附子小茴香各等分姜七片蔥七莖蓮鬚生酒一斤半煎熟候溫灌下拴暖房用韉蓋之取汗後補藥再服三五劑麻黃桂枝甘草枳實連翹麥冬杏仁天冬蒲黃桔梗花粉當歸青皮陳皮鬱金香附生地熟地防風荊芥蘿蔔子茴香川芎黃耆桑皮白芷以水酒各一盅煎熱擂碎加麻油一盅蜜二兩雞蛋兩個同煎灌之連日服治騾馬驢寒胃兜鈴紫菀芒硝大黃甘草青皮桑皮連翹梔子苦參天冬麥冬防風荊芥知母各一兩上分三劑擂碎同灌牛症肩爛舊綿絮三兩燒存性用麻油調敷漏蹄紫礦為末豬油和納蹄中燒鐵篦烙之一切疥癲杜蘅研為細末敷之或生搗塗亦可又方藜蘆末水調塗之傷熱胡麻葉搗汁塗之立瘥瘴疫石菖蒲淡竹葉葛粉鬱金緑豆蒼朮各等分為末每用一兩芭蕉自然汁一升入蜜一兩黃蠟二錢調和灌之未解再灌熱加大黃鼻頭無汗加麻黃鼻口出血加蒲黃又方夏茶二兩為末和水五升灌之尿血當歸紅花為末酒煎一合灌之腹脹燕子屎一合水調一合灌之噎皂莢末吹鼻中以鞋底拍尾停骨下身上生蟲當歸搗爛醋浸一宿塗之牛瘦厚朴陳皮蒼朮烏藥貫衆甘草黃芩川芎當歸白朮茯苓赤芍熟地枳殼紫蘇各一兩上分為劑研末水二碗酒一碗姜十片一日灌一劑十日定壯牛馬豬瘟硃砂麝香潮腦上各等分為末豬吹左鼻牛馬吹右鼻牛狗羸瘦泥鰍一二枚從口鼻送入則立肥牛不吃草青木香四兩金銀花藤一斤煎湯灌下即好牛馬豬瘟大黃朴硝各等分上泡湯一碗灌之瀉空餓半日用冷水一大盆食之即好羊證夾蹄羖羊脂熟去渣取鐵篦子火燒令熱將脂勻篦上烙之勿令入水次日即愈生癩藜蘆根不拘多少捶碎以米泔浸之瓶盛塞口置熱灶邊數候味酸先以瓦片刮患處令赤用湯洗之去瘡甲拭乾以藥塗之兩次即愈若癩多逐漸塗之兩次又方鍋底墨及鹽桐油各二兩調勻塗之豬瘟牙皂細辛川烏草烏雄黃狗天靈蓋上各等分燒灰為末吹入鼻中用五分即可牛馬亦可治加麝香五釐更妙中水先以水洗眼鼻中膿汙令淨次用鹽一大湯碗撮就將沸湯研化候冷澄取清汁注少許於兩鼻內五日即愈豬症諸病割去尾尖出血即愈瘴疫蘿蔔或葉食之不食則難救又方牙皂二錢火煅細辛三錢牙硝九錢上共為末竹管吹三分入鼻內貓證煨火疲瘁硫黃少許納豬腸中炮熟喂之或魚腸中飼之誤為人踏死蘇木濃煎湯灌之貓瘦畏寒龜肉喂之又煎烏藥灌之貓犬病磨烏藥灌之愈犬子病灌平胃散死胎不下芒硝石末二錢童便溫服無不效豐城曾尉有貓孕五子一子已生四子死腹中用此灌之即下狗證狗癩身上發癩蟲蠅百部汁塗即除去狗蠅濾麻油澤手擦其蠅即去卒死葵根塞鼻可治一切病水調平胃散灌之又方巴豆去殼和平胃散灌之惡犬令馴天靨肉一塊即雁也與食之終身不吠噬蓋以氣相制也猿病大蜘蛛研爛冷水調灌百病愈貫衆磨水灌之並壁上蟢子與食百病愈小猿宜喂人參黃耆大猿以蘿蔔喂之猿性不耐著地著地輒鳴以死煎附子汁飲之即愈鹿病鹽拌豆料喂之常以豌豆喂亦佳象生瘡滿身如馬生齒瘡之狀石蟹搗碎敷之駝病鬼臼穿山甲滑石木通各二兩上為末小油半斤溫水三升飢灌之熱水生瘡山梔黃連知母遠志貝母甘草各三兩上為末油半斤水五升飽灌之眼暈遮睛烏魚骨馬牙硝銅青白礬青鹽上各等分為末燈心點之口瘡菩薩石桑皮黃丹上各等分以青鹽少許為末入蜜熬膏每服一兩半啖之二便不通桑皮甘草各五兩大黃四兩芍藥滑石木通各二兩穿山甲一兩上共為末水五升油灰汁各半斤灌之力乏欲死鹽和麵納入口中飼之則三日不飢漏蹄人發灰石灰黃丹瀝青上為末脂油熬膏貼之胎衣不下小便祕澀木通一兩朴硝四兩上以灰汁大油一斤水三升飢灌之駝瀉不止炒鹽四兩生薑二兩白礬天仙子赤石脂赤黍米上各等分為末用酢同熬待飢灌之淋瀝牙茶四兩大全子赤麻子通草白醜黑醜各二兩上為末以襪汁一合大油一斤藥四兩飢灌之鱗介門魚病池中遭毒翻白急疏出毒水另引新水養之搗芭蕉根或糞清澆入可解魚生蝨瘦而生白點者名蝨蝨如小豆大形如鱉凡山中暴雨入池帶惡蟲穢氣亦令魚生蝨凡取魚見魚瘦宜細視之有則以松毛遍浮池中則除或以楓樹投水中則愈金魚生蝨新磚一塊入糞中浸一日取出令乾投魚缸內或用白楊或楓樹皮投缸中亦愈龜病鹽拌料豆喂之以嘹豆草喂之為佳醫蟲門蟋蟀病積食以水拌紅蟲飼之冷病嚼牙以帶血蚊蟲飼之熱病以緑豆芽尖葉或棒槌蟲飼之鬥後糞結以青粉小青蝦飼之鬥傷以自然銅浸水點之牙傷以苓姜點之咬傷以童便調蚯蚓糞點之並翎用池邊水草內青白色蜘蛛喂之中秋不上食者菱米栗子煮熟喂之柿餅肉亦妙牙損菜園中泥塊內紅蟲喂之深秋老蛩受傷不上食者雌蟹鉗內生肉以米飯同捻成小粒喂之早秋蛩受熱用廁上蛆蟲變成蛹兒內有小蟲名棒槌蟲喂解或用稻撮肉蟲蒸熟於烈日中曬乾以麻黃根研細拌喂隨用水楊柳細須洗淨浸水飲之能解熱毒蛩因缺水而色昏者以水潤窩蓋用青絹浸濕放於盆內使往來攢走則光彩勝舊蛩魚嬌嫩者洋溝內紅蟲喂之次以盆傍於日影中照二三日自然色勝蠶病山蛩燒灰摻之蠶遇狐臭生人及穢體汙厭則延亂不食如知之急焚香楓箬葉以解之熱病臘月內搗磨干桑葉成面以甕收貯飼之餘剩做牛料甚美救蠅溺死蠅被水淹死用指輕輕撈起取香灰拌好置桌久之則活自能飛去花木門花遲不發芝麻油醬馬糞二項入水和勻澆纍次即開毒蛀花木有蛀孔小孔用鐵絲通死其蟲若孔大用火藥灌滿以火燒之煙入蟲自死以上半月為妙落毛蟲凡花果樹生揚剌子食葉葉盡秋間發來春必死矣用指粗甘草二三寸長掘開土見老根將甘草緊貼老根埋之數日蟲自落但此法不許人見見則不驗矣建蘭生蝨蘭葉上忽生白點謂之蘭蝨用香油入水噴之或魚腥水或煮蚌湯灑之則除竹生稗竹開花結實如稗次年必死治法於初花時擇一二大竿截去止留於三尺打通其節用糞填實則花自止亦不敗矣茉莉花生蟻以烏頭煮湯冷灌之則絶川楝葉搗汁澆亦可薔薇腦生莠以剪銀鋪中爐火撒之蟲自死菖蒲無力萎黃鼠糞和水澆之即盛皂角無實根旁鑿一孔入生鐵屑三五斤泥封之即結角果樹生蟲以多竹燈掛在樹上蟲自落樹生癩甘草削竹釘針之自消不可針葡萄解樹藥釘凡木如肉桂作釘釘之即死用甘草水灌之復榮初烏賊骨釘之則翳以狗膽解之仍茂出櫻桃蟲櫻桃結實一經雨打則蟲自內生人莫之見須用水良久浸候蟲出方可食桃皮作脹凡桃樹其皮作脹初生四年後用刀自樹本豎刮其皮至生枝處使膠盡出則皮不脹不死多有數年之活桃自落實桃生子多則墜者亦多於社日舂根下土石壓其枝則實不更落若生蟲以煮豬首淡汁冷澆之自絶橘病橘有四病畏寒畏旱生蘚生蠹是也冬須以犬糞湧其根稻草裹其干則不凍死遇旱以米泔水澆則實不損落生苔蘚即刮去之有蛀屑飄出急用鐵絲通之再用杉木釘窒其孔桑癩蒲母草狀如竹葉以此草浸汁澆之若生桑蟲尋其穴桐油抹之蟲即滅矣蘿蔔空心蘿蔔鋤起切去葉止留寸許顛倒插土中直至過年永不空心花被麝沖凡花最忌麝沖瓜大尤忌之須於根旁栽數株薤蒜遇麝不損又法於上風頭以艾和雄黃末焚之即如舊木樨受蛀芝麻梗帶殼束懸樹上銀杏不結子雌樹鑿一孔入雄樹木一塊以泥封之便生子曲樹冷直凡樹直身曲者宜以刀豎劃其凹處則逐漸直樹老凡樹老以鍾乳末和泥於根上揭去皮抹之樹復茂桃樹永年桃樹命最短俗呼為短命樹俟栽出二三年後以刀斫去根上長出再斫去則百年長盛蘭泣蘭者花之君子能知恩義有善則報有哀則知所手植之人死必以哀麻一斤掛於蘭上否則立槁名曰蘭泣蘿蔔諸菜生蟲苦參末撥之即死取蟲門牙齒蟲痛鏡面草半握入麻油二點鹽半捻挼碎左疼塞右耳右疼塞左耳以薄泥餅貼耳門閉其氣仍側臥泥耳一二時去泥取草放水中看有蟲浮出久者黑次者褐新者白須於午前用之取牙蟲韭子一撮將碗底盛之覆水中用火燒煙外用小竹梗將下截劈開以紙如喇叭樣引煙燻蛀齒如下牙蛀者煎韭子濃汁漱之蟲自出齒䘌並蟲雀麥一名杜姥俗名牛星草用苦瓠葉三十枚洗淨取草剪長二寸以瓠葉作五色包之廣五分以三年醋漬之至日中以兩包並炮令熱納口中尉齒外邊冷易之取包置水中解視即有蟲長三分老者黃少者白多則二三十枚少則一二十枚此方甚妙牙齒蟲䘌韭菜連根洗搗同人家地板上泥和敷痛處腮上以紙蓋住一時取下有細蟲在泥上可除根又方韭根十個川椒二十粒香油少許桶上泥同搗敷痛牙頰上良久有蟲出數次即愈煙燻蟲牙瓦片煅紅安韭子數粒青油數點待煙起以筒吸引至痛處良久以溫水漱吐有小蟲出為效未盡再熏牙蟲作痛魚腥草花椒菜子油上各等分搗勻入泥少許丸如豆大隨左右塞耳內兩邊輪換不可一齊用閉耳氣塞一日夜取看有細蟲為效風蟲牙痛楊梅根皮韭菜根廚案上油泥等分搗勻貼於兩腮上半時辰其蟲從眼角出也屢用有效蟲牙鮮豬肚裡面微洗用竹刀刮下末以絺紗裹末咬緊蟲牙其上蟲即鑽入紗內痛立止寸白蛔蟲醋石榴東引根一握洗銼用水三升煎去半碗五更溫服盡至明取一大團永遠絶根食粥補之榴皮煎粥食之亦良寸白蟲痛先食豬肉一斤以沙糖水調黑鉛灰四錢五更服之蟲盡下食白粥一日下蛔蟲心痛如刺口吐清水乃蛔痛也白艾一升水三升煮一升服吐蟲出或取生艾搗汁五更食香脯一片乃飲一升當下蟲出取心氣痛蟲無問新久以生地黃一味隨人所食多少搗絞取汁溲麵作𩚼飥或冷淘食良久當利出蟲長一尺許似璧宮後不復患矣腹中蟲痛大麻子仁三升東行茱萸根八升漬水平日服二升至夜蟲下又方腹中有白蟲以馬齒莧水煮一碗和鹽醋食之須空腹下少頃白蟲自出也一切蟲痛狼毒杵末每服一錢用錫一皂子大沙糖以水泡開臥時空腹食次早蟲即下也小兒蟲瘡舊絹作衣以柏油塗之與兒穿著次日蟲皆出油上取下爁之有聲者是也別以油衣與穿以蟲盡出為度取瘰癧蟲先於瘡上灸三壯然後用藥清作瘡口用新活鱔魚截作一指大劈開就掩在瘡口少時覺瘡內癢急揭起魚覷魚上有細蟲如馬尾一節蟲出如卷三五次取盡蟲子後用藥斂瘡口取足瘡生蟲南方地土卑濕人多患足瘡久生蟲如蛭乃風毒攻注而然用牛或羊或豬肚去糞不洗研如泥看瘡大小入煅過泥礬半兩研勻塗帛上貼須臾癢入心徐徐連帛取下火上炙之蟲出絲髮馬尾千萬或青白赤黑以湯洗之三日一作不過數次蟲盡出瘡愈取疽瘡蟲生麻油渣貼綿裹當有蟲出積年骨疽一捏一汁出者熬飴餳勃瘡上仍破生鯉魚爁之頃刮視蟲出更洗敷藥蟲盡則愈消渴有蟲苦楝根白皮一握切焙入麝香少許水二碗煎一碗空心飲之下蟲如蛔而紅色其渴自止雖困頓不妨消渴有蟲人所不妨瘻有蟲八月中多取斑蝥以苦酒浸半日曬乾每用五個銅器炒熟為末巴豆一粒黃犬背上毛二七根炒研硃砂同和苦酒頓服其蟲盡出也聤耳有蟲膿血不止用鯉魚醋三斤鯉魚醋腦一枚鯉魚腸一具洗切烏麻子炒研一升同搗入器中微火炙暖布裹貼兩耳食頃有白蟲出盡則愈慎風寒吐蠱吮白礬味甘嚼黑豆不腥即中蠱也石榴根皮煎膿汁服即吐出活蠱無不愈者蠼螋尿瘡清明釀造春酒飲之至醉須臾蟲出如米也取疸眼蟲爛眼疳有蟲用覆盆子葉咀嚼留汁入筒中以皂紗矇眼滴汁漬下弦轉瞬間蟲從紗出數日下弦干後如法滴上弦又復得蟲數十而愈或用覆盆子嫩葉搗汁點目眥三四次有蟲隨眵淚出成塊也無鮮葉以乾者煎濃亦可三十六黃雞子一枚連殼燒灰研醋一合和之溫服鼻中蟲出為效極黃者不過三枚神效五色帶下以面作煎餅七個安於燒赤黃磚上以黃瓜蔞敷面上安布兩重令患者坐之令藥氣入腹熏之當有蟲出如蠶子不過三五度瘥臁瘡蛀爛鱔魚數條打死香油抹腹蟠瘡上系足頃則痛不可忍然後取下看腹有針眼者蟲也未盡再作後以人脛骨灰油調擦之臁瘡生蟲小蝦三十尾去頭足殼糯米飯研爛隔紗貼瘡上別以紗罩之一夜解下掛看是小赤蟲即以蔥椒湯洗淨用舊籠內白竹葉隨大小剪貼一日二換待汁出盡逐日煎苦楝根湯洗之以好膏貼之將生肉勿換膏藥取痔蟲水銀棗膏各二兩同研納下部綿裹納明日蟲出痔漏有蟲黑白牽牛各一兩炒為末以豬肉四兩切碎炒熟蘸末食之食盡以白米飯三匙壓之取下白蟲為效腸痔出血桃葉一斤杵納小口器中坐蒸之有蟲自出下部蟲癢蒸大棗取膏以水銀和捻長三寸以綿裹夜納下部中明日蟲皆出下部䘌蟲痛癢膿血旁生孔竅蜣螂七枚五月五日收者新牛糞半兩羊肉一兩炒黃同搗成膏丸蓮子大炙熱綿裹納肛中半日即大便中蟲出三四度三木節散治風勞面色青肢節沉重膂間痛或熱或躁或嗔思食不能食被蟲侵蝕證狀多端天靈蓋酥炙研二兩牛黃人中白焙各五錢麝香二錢為末別以樟木瘤節槐木瘤節各為末五兩每以三錢水一盞煎半盞去渣調前末一錢五更頓服取下蟲物為妙肝勞生蟲眼中赤脈吳茱萸根為末一兩半粳米半合雞子白三個化蠟一兩半和丸小豆大每米湯三十丸當取下蟲脾勞發熱有蟲在脾中為病令人好嘔東行茱萸根大者一尺大椿子八升橘皮二兩三物合咀以酒一斗浸一宿微火薄暖之絞去渣平旦空腹服一升取下蟲或死或半爛或下黃汁凡作藥時切忌言語追勞取蟲啄木禽一隻硃砂四兩精豬肉四兩餓令一晝夜將二味和服之至盡以鹽泥固濟煅一夜五更取出勿打破連土埋土中二尺次日取出破開入鉛口器內研末以無灰酒入麝香少許作一服須謹候安排待蟲出速鉗入油鍋內煎之後服局方嘉禾散一劑大風癩蟲苦參末二兩豬肚盛之縫合煮熟取出去藥先餓一日次早先飲清水一盞將肚食之如吐再食待一二時以肉湯調無憂散五七錢服取出大小蟲一二萬為效後用不蛀皂角一斤去皮子煮汁入苦參末調糊下何首烏末四兩防風末一兩半當歸末一兩白芍藥末五錢人參末三錢丸梧子大每服三五十丸溫酒或茶下日三服仍用麻黃苦參荊芥煎洗之癘風有蟲眉落聲變用預知子雄黃各二兩為末以乳香三兩同水一斗銀鍋煎至五升入二末熬膏瓶盛之每服一匙溫水調服有蟲如尾隨大便而出大風癘蟲黃柏末皂角刺灰各三錢研勻空心酒服取下蟲物亦不損人食白粥三兩日服補氣藥數劑如四肢腫用針刺出水再服忌一切魚肉發風之物取下蟲大小長短其色不一約一二升其病自愈藥戲門大道丸治荒黑豆一升去皮貫衆甘草各一兩茯苓吳術砂仁各五錢上銼碎用水同豆熬煎火須文武緊慢得中直至水盡揀去藥取豆搗如泥如芡子大磁器盛之密封每嚼一丸則恣食草木苗葉可飽且無毒其味與飯同祖師修行方白茯苓甘菊花松柏香白芷各十兩共為末蜜丸黃豆大每服十丸送下百日不飢連服三服永不飢也不信先將一丸與雞吃百日不飢要開藥之日先吃米湯或菜湯亦可取下藥來韓湘子脫衣方五靈脂半夏及天仙狼毒雅兒草烏也等分全搗爛細羅三四兩布袍用水七升煎輕輕慢火煎熬盡曬燥來雪後穿雖是一重單如著十斤綿韓湘子煮袍鞋法茯苓貫衆天仙子狼毒草烏白礬五靈脂各一兩上共為細末用水一桶同藥末下鍋煮袍鞋一雙汁盡曬乾冬不透風寒夏涼不漏水煮白石法七月七日取地榆根不拘多少陰乾百日燒灰復取生者與灰合搗萬下灰三分生末一分合之若石二三十水浸過三寸以藥入水攪之煮至石爛可食乃已行路不吃飯自飽芝麻一升紅棗一升糯米一升上共研末蜜丸如彈子大每服一丸水下可一日不飢行路不飲水不渴白砂糖白茯苓薄荷甘草各四兩上共為末煉蜜丸如棗子大每服十丸含化可千里之程不渴千里酒天仙子川烏貫衆各一兩甘菊花三錢陳皮五錢甘草一錢上為末糯米一升燒酒五碗煮作粥糜冷定入前藥和勻瓶內封固三七日取出用面一斤炒黃為末煉蜜丸如櫻桃大並酥油金箔為衣用時投一丸於滾湯中即化為酒千里醋烏梅一斤去核釅醋五斤浸一伏時曬乾再浸再曬以醋收盡為度搗為末醋浸蒸餅和之為丸如芡子大飲時投一二丸於滾湯中即好醋矣千里鞋治遠行腳腫草烏細辛防風上各等分為末摻鞋底內如草鞋以水微濕摻之用之可行千里妙漿衣不透雨草烏白及白茯苓狼毒白仙子白礬各一兩上共為末和入漿內衣不透雨暑天換襖蒼朮白芷各四兩上切片真麻油浸之過三宿炒乾不用研每至半夏子時食三兩以盡為度故著衣不熱寒月入水端午午時取水蜈蚣不拘多少曬乾為末每服須三五錢暖酒送下不可冷吃如冷吃即生瘡疥可以冬月入水無妨造夢法䓪花陰乾百日搗末日暮水服方寸匕乃臥思念所欲事即於眠中見晤也䓪花即萯陸花也見鬼丸生麻子菖蒲鬼臼上各等分杵丸彈子大每朝向日即服一丸百日見鬼也剃頭不用刀石黃石灰各一兩樟腦為末調敷即下女人去面毛不用線石黃三錢石灰二錢為細末水調臨臥時敷面則面毛盡去矣飲酒不醉赤黍浸以狐血陰乾飲酒時取一丸置舌下含入令人不醉寫字去墨滑石二兩石灰一兩烏羊骨二兩燒灰赤硇砂一兩共為細末米泔水調勻磁罐收置背陽曬乾用時清水扎蓋字上候片刻擦去又法山中活竹將一節開一小孔括去青入砒末於內生漆綿纏口待三五日竹有霜磁罐收貯擦字又法白羊骨煅一兩白丁香一兩寒水石五錢半生半煅紫鹼一兩為細末用雞蛋開一小孔去黃留白調藥復入殼封固入雞蛋內同抱以小雞出為度取出用水調擦立刻彈去又法官粉一錢蔓荊七分龍齒三分白丁香三分紫丁香鷹屎也三分上共為細末用皮術汁調勻以磚兩塊燒滾候溫將藥夾於其中次早自干仍研為末用時手指擦塗於字上其墨自落矣洗字法西瓜一個約重三斤半熟者蒂邊開一孔入官硼砂三錢五分砂三錢五分磠四錢上共為細末入瓜孔內懸七日白霜自出以翎毛掃下又一七收用先將清水濕字以藥擦之待乾用翎掃去紙白新鮮起字法明礬三兩鷹糞三錢石灰一兩官粉一兩雀糞三錢陽起石一兩鶴糞三錢透骨草一兩俱為細末童便調將打桶盛掛陰處發出霜水調描字墨自去墨名不染紙端午午日用上好京墨一塊不拘大小入蝦蟆口中線縛定口於朝陽地上掘一坎深五尺不拘埋蝦蟆在內經四十九日取墨寫紙上一拂便落灰種仙菜術家用羊角蹄燒作灰撒濕地遍踏之即生蘿勒俗呼王母菜食之益人驅除虎蛇神煙鹿牛羊麂犀角各二兩烰炭四兩硝黃各二兩雌黃雄黃二兩則虎蛇亦遠矣驅鼠法桃頭椿樹皮絲瓜藤楝青葉各等分曬乾研末加信石一錢燒之鼠即遠矣掃蚊煙端午多收浮萍曬乾研末楝樹花團魚骨鱔魚骨信石少許共研末燒一次七夜無蚊聚蝶取百花心陰乾夜露蜜拌見有衆蝶飛舞將蜜塗兩手心立上風將兩手相合而搓相向而拍群蝶聞香皆來就矣拍掌喚蝶至春來採取諸花蕊用白馬尿三日曬乾研末以川椒塗手上卻於有蝶處立於上風拍掌即飛來矣漿衣去蝨白果二三十枚加水銀三分搗野菊花三錢研末同漿攪勻漿衣永不生蝨造白雀法雀方出殼未羽時以蜜和飯飼之則遍身生羽毛鳶頭散治鬼魅邪氣東海鳶頭黃牙即金牙茛菪子防葵為末酒方寸匕欲令病人見鬼增防葵一分欲令知鬼又增一分立驗不可多服擦銅如銀水銀二錢白礬一兩飛丹一錢用唾研末為度以銅洗淨用藥擦之即紅銅亦如白銀擦錫如金膽礬一兩白礬一兩共為末擦之錫如金色鐵變紅色點斑竹硇砂五錢細研緑礬膽礬各三錢石灰五錢一處再研細入濃灰汁調勻隨奇文點候乾揩洗其斑如自然者磁器竹木皆可用又法硇砂五錢石灰一兩共研米醋調點畫竹上點磁器白及一兩為末雞子清調勻修補以線扎緊火上烘乾如新永不壞忌用雞湯磨鏡丹藥水銀一兩上好錫夏秋七分春冬八分明礬夏秋一錢二分春冬一錢五分先將錫熔化入水銀攪勻冷定同研細如飛面大略要不起霜礬少為妙加鹿頂骨更妙一云鹿骨燒灰寫字入石龜尿炭硇砂少許共為末入硯池水內然後研墨以新筆寫字石上可透一分入石內若寫在木上或門上可入透五分點藥鏡雌黃入紫粉霜硇砂細研末用膠水調任意於鏡上描鸞鳳花草候乾火燒片時以磨鏡藥磨去其畫自現稜碗膠桐油熬熟入瀝青調稀入石灰調合作膠頃刻成碑爐底不拘多少加白礬少許再用鵝蛋清調成錠用瘦米採黑飯樹葉即南燭枝葉止庵按非也余曾見山人作青飯以胡麻葉漬米為之胡麻似南燭實圓葉如細珠味甘時人皆未之見故方言多誤清水浸米九蒸九曬則米瘦如麻每石瘦至一升涼水一泡頃刻成飯且輕少利於持負巧洗油跡如衣服被麻油汙垢加上桐油如被桐油汙垢加上麻油後將細面泡湯洗之如不淨加紫蘇湯洗之如神春球用濾淨柴炭湯三飯碗下鍋燒滾逐漸摻下松香末約兩許急將筋旋摻旋攪再煎幾過用篾扎圈如茶杯大蘸湯灑空中結泡大如碗五色飛揚可玩或用稻柴灰亦可斟酒不溢無名異磨盞口注酒雖浮於盞不溢出又法用好沒塊周圍抹杯口上將酒斟滿盈過杯一分其酒不溢出杯外葫蘆相打取一樣葫蘆三個挖開大口以末和膠調填在內一個將蠟調針砂置口內一個將磁石末調膠置口內一個以水銀置口內將針砂者與磁石者放在一處兩個自然相打後將水銀者放於中間兩個自然分開木狗自走實木一段雕狗形以膠水並鹽醋調和鐵屑擦在狗頭上候乾以上好磁石一塊暗藏於手內引其狗走隨手而來金杯分酒取獺膽塗犀角簪上將酒一杯斟滿將簪向杯中分其酒兩開矣手帕盛酒胡粉五錢槐膠二分雞蛋一個用清用水一碗拌勻以新手巾在其藥內洗三四次尉開如故任意盛酒一滴不漏做大蛋豬尿脬一個不落水將灰拌用腳踏至大不拘雞鴨蛋一樣打破傾碗隨多少調和裝入胞內扎緊口外用油紙包裹沉井底一夜次日取出煮熟剝開胞內黃白照舊如大蛋一般甚妙長明炷谷樹滋擦燈草陰乾又上一硫黃少許一梗可點一更
