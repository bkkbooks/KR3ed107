body:
  text: 卷一禁藥門李子建殺鬼丸闢瘟疫殺一切鬼魅魍魎藜藿一兩虎頭一兩五錢雄黃鬼臼天雄皂莢蕪荑各五錢上為末蜜丸如皂子大熱病時氣燒一丸安床頭闢疫凡入瘟疫之家以麻油塗鼻孔中然後入病家去則不相傳染既出或以紙捻探鼻深入令嚏之方為佳時疫大行自家水缸內每早投黑豆一把全家無恙截瘧端午七姓人家粽尖獨囊蒜七枚雄黃三錢巴霜一錢去油搗為末小丸獨用硃砂為衣臨發日未來時棉裹塞鼻孔中男左女右過夜即止去藥或用膏藥些須貼眉心止即去之嫁腋氣枸桔樹鑿孔取汁一二碗用青木香東桃西柳七姓婦人乳一處煎一二沸就熱於五月五日雞叫時洗了將水放在十字路速回弗顧即愈只是他人先過者必帶去也枸桔樹即枳椇也衛生簡易方香草散截瘧香附醋浸透銅鍋炒一兩半草烏面同炒去面五錢為末每用一分臨發時先時含舌上滾湯下老弱七八釐小兒五釐極重二服即愈斷酒不飲酒七升硃砂半兩瓶浸緊封安豬圈內任豬搖動七日取出頓飲取蛇牙蛇毒螫傷牙入肉中痛不可忍者勿令人知私以荇葉覆其上穿處以物包之一時折牙自出也禁蛙鳴野菊花連梗葉為末順風撒去其聲即止又方以牛膝塗紙置水中亦不鳴貓鬼野道相思子蓖麻子巴豆各一枚硃砂末蠟各四銖合搗丸如麻子大服之即以灰圍患人面前著一斗灰火吐藥入火中沸即畫十字於火其貓鬼者死也化金蠶雷丸三錢為末同白礬少許調勻金蠶出現時以末少許摻之立時蟲化為紅水如血蠱神必震怒作祟倘空中有聲即將藥聽其聲響處灑去神必大罵負心而去永不再至矣闢水毒蛇莓根搗末服之並導下部亦可飲汁一二升夏月欲入水先以少許投中流更無所畏又闢射工家中以器貯水浴身亦宜投少許蛇莓地引細蔓節節生根每枝三葉葉有齒刻四五月間開小黃花五出結實鮮紅狀似覆盆子而面與蒂不同除蟲蟻驚蟄日用石灰糝門檻外免蟲蟻出禁蠍螫咒曰委傳仙挕敕斬蛜蜥滅如有蠍螫之人求治於患處望而取氣一口默唸七遍怒著作法吹蠍處其痛即止用法之人忌五厭肉闢蠅蚊楝樹一技將酒糊塗之懸掛空處蠅飛不能走收過二三次即無放蠅必曠野不可打死訣曰甘草藜蘆楝子花更兼一味夜明砂每日清晨燒一撮蠅蚊只在兩臨家禁蚊端午日取浮萍一把鬧羊花一把為末清明日取鱉血和二味調勻搽在房門上則蚊蟲一室俱無矣又新造房屋內柱下四隅埋蒲扇蚊永不入滅蝨除蚤百部水銀茶葉各一錢黑棗三枚上研和布包帶身不生蝨鴿糞水龍骨風茄花三朵打和燒臭蟲絕根除花菜地不生蟲楝樹根燒灰盛布袋待露水濕撒之即除驅蠅臘月取鱖魚一枚懸廁上則無蠅又臘月八日懸豬脂於廁上則無蠅除蚤蝨蛇蟲諸毒樟腦五錢茅朮石菖蒲各三錢上共為末摻床褥間及壁角諸處則絕又芥菜子辣蓼樟腦各一錢燒煙燻之即除除臭蟲硫黃數錢為末棉花子燒煙燻二三次即絕闢痘入目凡痘初起時將獨女胭脂揩眼眶則痘不入目一見痘時牛蒡子不拘多少其母嚼碎貼兒囟門則不入目嗜茶成癖一人病此方士令以新鞋成茶令滿任意食盡再盛一鞋如此三度自不吃也男用女鞋女用男鞋頗驗斷蜒蚰白礬水灑其來處又用酒腳糊窗紙則蜒蚰不入驅馬蟥二麥稈頓於水上流水入池中可祛馬蟥闢漆氣人有見漆多為漆氣上騰著人而生漆瘡者川椒三四十粒搗研塗口鼻中則不為漆所害禁鬼埋瓦石於宅四隅捶桃核七枚則鬼無能為殃令病不復取女中下裳帶一尺燒研米飯即免勞復禁蛾入火取燈草用冬雪水浸七日取起陰乾暑月燃燈凡一切蟲蛾即不奔赴又方清明早晨取井水一盆不可落地折柳枝一條同燈草浸其中取起陰乾暑月燃之可免蟲蛾撲滅小兒夜啼取井邊草私著席下勿令母知或雞窠豬窠中草皆可小兒腹痛取樹孔中草暗著戶上即止闢瘡瘃人日午時取獨蒜搗爛塗麵皮手腳一年不生惡瘡冬有不作凍瘃不多瘵神驗字禁門避祟小兒額上八十字此乃旃檀王押字鬼祟見則遠避截瘧每逢發期先將後開名字用硃筆寫就男左女右縛於臂上即止一六日良田二七日孟逢春三八日季天祿四九日謝閒遊五十日任牙生又以左右一個月用墨書圓行路非難促取瘧鬼送與河官書了收向患瘧者懷裡於江河水畔行欲發時取出擲向水中便歸即效又橘葉七片每片朱書一字魁𩲃𩵄䰢魓𩳐魒將葉焙乾為末發時白湯吞之又方病人走到背立褪露左肩上寫管仲子三字寫完即走在外不要回顧凡用此法須預叮囑病人走到自袒其肩寫畢竟去不可開口小兒口瘡湯餅內滷為末醋調臨臥時書十字於兩足心即愈闢蛇蠍端午日將硃砂寫茶字倒貼闢蛇蠍闢蠅蚊書風字間字貼窗壁下無蚊又端午日書白字倒貼或寫儀方亦可闢蛇於四壁柱下用倒流水研墨書龍字貼之蛇見自畏多用磚瓦寫儀方二字四處置之蛇見即畏避除蝨名五字符吸北方煞氣一口噴筆尖上書欽深淵默漆五字於黃紙上綴於衣帳床褥間其蝨自然除蜂螫蜂螫以竹寫丙丁火於地上寫七遍取土揩螫處一法掐劍訣向空書子醜寅卯辰巳午未申酉字豎直監至地取土搽之即愈闢蜒蚰端午書滑字及闢蚊蚋書風煙字間貼窗壁闢臭蟲用紙書云欠我青州木瓜錢將此字貼於床腳上忽然不見一云張三賢張三賢買了木瓜不完錢一去三十年寫此貼床腳上亦驗一法買木瓜一個臨臥時以手拍瓜口念云張世緣張世緣欠了河南木瓜客人錢木瓜客人今在此速去速去速去來還錢臭蟲自遁也驅蛇蟲藏經有偈云苦求求不得多求致怨憎梵求菩提徹老不見相見依此倒寫貼四壁外甚效止燕窠書戊字貼至處又用白紙朱書鳳凰二字貼於巢上即去小兒夜啼用火柴頭一個長四五寸削平面用硃砂書云撥火杖撥火杖將來捉神來捉著夜啼鬼打殺不要放急急如律令又將硃砂書甲寅二字貼床頭即止化骨左手三山訣執淨水一碗右手劍訣二指於水面上寫𩳧龍虎急化四字字書分明吞服蜈蚣螫書地作五字取土糝之即愈骨哽用茶水虛空以手指寫天上金雞叫地下草雞啼兩雞並一雞九龍下海喉嚨化如滄海二十五字口誦七遍飲此立愈又書鳥飛龍下魚化舟邱亦可絕一切蟲毒曰酉五月五日午時書此貼壁毒蟲永絕治湯火咒龍樹五如來授吾行持北方壬癸禁火大法龍樹五如來吾是北方壬癸斬天下火星辰天下火星辰必降急急如律令手握真武印吹之即用少許冷水洗雖有火燒手足成瘡皆可療治骨哽咒紅引登樓問此星我出真人問此人太上老君急急如律令敕一氣七遍呵入茶酒中飲之立愈治骨鯁𩳧喉內卡骨用此字如利害者照此字寫七個或九個吃飯即飯碗麵上酒即在酒杯面上寫寫畢飲之效又法𩳧賴喉卡魚骨用此字如利害照前法效術禁門釘毒治一切腫毒瘡癤若患三日內者釘便散若已成即易瘥囗㵘濃好者依此法於土牆上高處書之以竹釘就中間釘之先令病人嗽一聲便吸氣於釘上七釘止仍不得移動須至誠則神驗釘瘧水溢仙人歌曰瘧是邪風寒熱攻直須術治免成空常人刻作人形狀釘在孩兒生氣宮如金生人金在己即釘己木生人釘在亥上火生人釘寅上水土生人釘申上也白虎病綱目白獅子石下江東人呼為歷節風是也置此於病者前自愈亦厭伏之意也白虎糞神名狀如貓埽糞置門下令人病此療法以雞子揩病人痛處咒愿送於糞堆之頭上勿反顧取土瓦年深既古且潤三角瓦一塊令三姓童子候星初出時指第一星下火於屋上炙卵癀偏墜雙蒂茄子懸房門上出入用眼視之茄蔫患亦蔫茄干患亦十矣又懸雙茄子門上每日抱童子視之二三次釘針於上十餘日消矣身面疣目七月七日以火豆拭疣上三過使本人種豆於南向屋東頭二溜中豆生葉以熱沃殺即愈消胬肉凡人身有胬肉可聽人家釘棺下斧之時便於手擦二七遍以後自消平產婦勿用眼生偷針布針一個對井睨視已而折為兩斷投井中勿令人見小兒夜啼以撥火杖一根以劍訣手書敕令默咒曰撥火杖撥火杖玉皇命你做丞相拏住夜啼鬼打死打死永不放吾差三十六神將鐵棍銅槌祛邪歸正吾奉太上老君急急如律令敕小兒遺尿紅紙剪馬四疋令兒自安身下每夜如之破傷風火命婦人取無根水一盞入百草霜調捏作餅放患處三五換如神咒棗除百病咒曰華表桂念七遍望天罡取氣一口吹於棗嚼吃湯水下華表桂鬼之祖名也夜臥禁魘凡臥時以鞋一仰一覆置床下無惡夢及魘疾患疼痛咒曰金木水火土五行助力六甲同威天罡大神收入棗心棗入腸中六腑安寧萬病俱息速急求茶用棗一枚唸咒一遍吸罡氣一口入棗中男去尖女去蒂用水嚼下忌𭥯犬物七日咒梨除瘧取梨一個先吸南方氣一口將梨咒曰南方有池池中有水水中有魚三頭九尾不食人間五穀惟食瘧鬼密咒三遍吹於梨上書敕殺死三字令病人臨發前食之咒餅除瘧咒法先面東燒香虔誠於油餅中心書一攤字不用糖餅書如錢大須新筆淨墨以筆圈之左邊圍三次持筆於香上誦乾元亨利貞七遍發日早搯去所書字用棗湯嚼餅食之人身上結筋用木杓打之三下自散百蟲傷先問被傷甚蟲傷來默唸火德真君黑煞攝吹在被傷處如此七遍被傷人自麻不痛蜂蠆螫傷瓦摩其上唾一七遍置瓦於故處禁鼠逐月旦日取泥屋之四角及塞鼠穴一年鼠皆絕跡此李處士禁法也神後正月起申順行十二辰驅蛇蟲黃紙朱書三字符老誠於土地前焚香將符貼土地堂內則蛇蟲不復出現而潛去矣如值夜行及草路中畏蛇蟲當道則煩會此三字依法搯訣即無見矣用左手剔酉搯己為訣方書三字符敕令𩲠鬼宜𩲠一法用儀方儀康四字驅蚊收東方青煞炁咒七遍噓入水碗中將水以口吸而噴四壁各處其蚊自去咒曰天上三足為鳥嘴利如錘啄不食人間五穀只食蚊蟲骨髓急急如太上老君律令又咒曰天地太清日月太明陰陽太和急急如律令敕面向太陽念七遍吸氣吹燈草上夜點之闢蚊蟲又於除夕五更使一人於堂中向南扇一人問作何事答曰扇蚊子乃已永無蚊患又端午正午時望太陽將水咒曰天上金雞吃蚊子腦髓吸太陽氣吹燈心夜將燈心點滅臭蟲災除元煞咒曰日出東方壁畢元藏天煞地煞月煞二十四煞七十二煞一切煞星惡星盡皆煞除臭蟲滅跡滅屍蟲春正上甲乙日視歲所在焚香朝朝禮拜祝曰臣願東方明星君抉我魂接我魄使我壽命綿長如松柏願臣身中三尸九蟲盡消滅頻頻行之吉起死門雷真君傳治五絕乃縊跌魘淹壓等死先書符一道於黃紙焚化在熱黃酒內撬開牙關灌入喉中後再用藥丸調黃酒內以人口含蔥管送入死人喉內少頃即蘇招魂符式此符無咒一心對雷真君天醫使者書之靈驗無比藥名救絕仙丹山羊血二錢菖蒲二錢人參三錢紅花一錢皂角刺一錢製半夏三錢蘇葉二錢麝香一錢上各為末蜜丸龍眼核大酒化開以端午日修合好每料約十丸此方神奇之至不但救五絕凡有邪祟昏迷一時猝倒者皆可起死回生騎牛法專救溺死凡人由水中救起以身俯伏於牛背上手足俱用人扶另用一人牽牛緩行有五里之久自活懸雞法專救縊凡人縊者將人解下輕扶仰臥將活公雞倒懸流出口涎入人口內自活插鵝法治自縊用老鵝一隻將香油抹鵝嘴上插入糞門一二時自活若過十二時辰則不救矣溺死以所溺之人扶在椅上將其左右手腳不住運動後將其口耳穀道塞住兩眼亦包住用舊藍布捻繩燒煙先以竹管呼煙吹入鼻孔水即鼻出俟有微氣即以布繩煙燻其鼻孔即活救誤死凡人無病或坐臥或酒後陡然即死者名旺痧將本人口內用鐵器撬開以銀簪刺下小有筋血出即活不可刺正中又方以悶醋灌下即刻活矣卒中惡死或先病或平居寢臥奄息而死皆是中惡急取蔥心刺入鼻孔中男左女右入七八寸鼻目血出即蘇人卒暴死搗女青一錢安咽中以水或酒送下立活還魂湯麻黃二兩去節杏仁七十個去皮尖甘草一兩水二碗煎一碗去渣灌之血風攻死婦人血風攻腦頭旋悶絕忽死倒地不知人事者蒼耳草嫩心陰乾為末酒服一大錢其功甚速此物善通頂門連腦打死松節捶碎一二升入鐵鍋內炒起青煙為度以老黃酒二三升四圍衝入即濾淨候半熱開牙灌入即活小兒驚死大叫一聲就死者名老鴉驚以散麻纏作脅下及手心足心燈火捻之用老鴉蒜曬乾車前子等分為末水調貼手心仍以燈心焠手足心及肩膊眉心鼻心即醒也解藥毒死只要心間溫暖者乃是熱物犯之防風一味擂冷水灌之產後暈絕此扁鵲法也半夏末冷水和丸大豆大納鼻中即愈喉痹垂死止有餘氣者巴豆去皮線穿納入喉中牽出即愈華佗危病方治纏喉風喉閉其症先兩日胸膈氣緊出氣短促驀然咽喉腫痛手足厥冷氣閉不通頃刻不治巴豆七枚三生四熟生者去殼研熟者去殼炒去油存性雄黃皂子大者研鬱金一個蟬肚者研細共為細末每服半茶匙細呷如口噤咽塞用小竹管納藥吹喉中須臾吐利即醒如無前藥用川升麻四兩銼碎水四碗煎一碗灌入又無升麻用皂角三綻捶碎擂水一盞灌之或吐或不吐即安急痧將死將口撐開看其舌處有黑筋三股男左女右刺出紫血一點即愈刺血忌用針須用竹箸嵌碎磁碗尖為妙中間一筋切不可刺急救方將雄狐膽收藏十二月遇暴亡之人以溫湯細研灌下即活援絕神方凡人患痢便血一日至百十次不止者至危急也即以此藥援危又不損傷氣血痢止身亦健白芍二兩當歸二兩枳殼二錢檳榔二錢甘草二錢滑石末三錢木香一錢蘿蔔子一錢水煎服一劑輕二劑三劑全愈金瘡鐵扇散象皮五錢切薄片用小鍋焙黃色以干為度勿令焦龍骨五錢用上白者生研細末老材香一兩山陝諸省無漆民間棺殮俱用松香黃蠟塗棺內數十年後有遷葬者棺朽另移新棺具棺朽之內黃蠟即謂老材香東南各省無材香即以數百年之陳石灰一兩代之俱效驗亦與老材香同寸柏香即松香之黑色形者松香一兩與寸柏香一兩一同熔化攪勻傾入冷水中取出曬乾飛礬一兩片白礬入內熬化即是共為細末貯磁罐中遇有刀石破傷者用敷瘡口以扇向瘡口扇之立愈忌臥熱處如傷處發腫煎黃連水用翎毛蘸塗之即消傷處不必用布包裹以致過暖難於結痂並忌飲酒以致氣血妄行至敷藥之時若血流乃用扇扇之倘不流即不必扇蓋傷處喜涼惡熱夏日宜臥涼地冬日忌臥熱處保生門損目破睛牛口涎每日點兩次須要避風黑睛破者亦瘥金瘡腸出小麥五升水九升取四升綿濾取汁待極冷令病人臥席上含汁噀之腸漸入噀其背並勿令人知及旁人見旁人知即腸不入也乃抬席四角輕搖使腸自入十日中但略美物慎勿驚動即殺人腦破折骨龍腦明透者三錢冰片三分人參三錢象皮一錢生地三錢土狗三個去頭翅地蝨二十個先將人參各項研末用土狗地蝨搗爛入前藥搗之佩身上三日乾為末瓶貯遇有此等病醫之可也並可接骨服下神效骨斷者服一錢即愈眉落復生桑葉七片每日洗之一月重生須落亦然卒心急痛牙關緊閉欲絕老蔥白五莖去皮須搗膏以匙入咽中灌以麻油四兩但得下咽即蘇少頃積蟲皆化黃水而下永不再發累得救人痘瘡壞症身如黑團之氣口不能言食不能下皆由氣虛而火不能發也毒流於中而不得泄形如死者人參三錢元參二兩荊芥一兩金銀花二兩陳皮水煎五分上藥灌之下喉而眼開少頃身動久之而神氣回口能言食能下矣不必再服他藥痘瘡自回而生全至奇之方也奇藥門立泯傷腫治撲打有傷或青腫紫硬此藥泯之熟麻油和酒飲之以火燒熱地臥覺即疼痛俱消探生散治小兒急慢驚風諸藥不治以此定其死生雄黃沒藥各一錢乳香五分麝香二分半共為末用少許吹入鼻中有眼淚鼻涕可治接骨散凡跌損骨節脫臼接骨者用此則能不知痛也茉莉根酒磨一寸服則昏迷一日乃醒二寸二日三寸三時亦奇方也縮陽秘方水蛭九條入水碗養至七月七日陰乾秤有多少入麝香蘇合三味一般細研為末蜜少許為餅遇陽興時即將少許擦左腳心即時痿縮過日復興再擦癆病火動陽常起者以皮硝於手心兩手合住自化陽即痿矣睡聖散人難忍艾火灸痛此即昏睡不知痛亦不傷人山茄花即風茄七月收火麻花即黃麻今圃地所植者七月收收此二花必須端莊閉口齊手足採之若二人去或笑或言語後亦言笑如之採後共為細末每服三錢小兒一錢茶酒任下敏按二花性太烈三錢之分量雖得然斷不可服宜量人增減一服後煎湯含漱半日漱完再用龍齒末三分人參末一錢麥冬末一錢血竭三分冰片二分土狗一個地蝨十個各火焙為末放地上一刻出火氣將末藥乘人參漱口完時即以此末自己用舌蘸之使令遍不可將舌即縮入口中放在外半刻至不能忍然後縮入可也三次則伸長矣長齒法雄鼠脊骨全副余骨不用尾亦不用頭亦不用骨碎補三錢炒為末麝香一分熟地身懷之令乾為末三錢必須自制切不可犯鐵器一犯則前藥俱不效矣熟地亦須看一做過鐵針穿孔者即不效細辛三分榆樹皮三分總之諸藥俱忌鐵器當歸一錢青鹽二錢杜仲一錢各為細末鼠骨新瓦焙乾為末不可燒焦乘其生氣也用一磁器盛之每日五更時不可出聲將此藥輕擦無牙之處三十六擦任其自然嚥下不可用水漱口一月如是日間午間擦之更佳亦如前數瀉毒神丹瀉砒毒大黃二兩生甘草五錢白礬一兩當歸三兩水煎數碗飲之立時大瀉則生否則毒入於臟無可救矣逐火丹治湯火傷大黃五錢當歸四兩荊芥三錢炒黑生甘草五錢黃芩三錢防風三錢黃耆三兩茯苓三兩水煎服一劑痛減半二劑全減三劑瘡口全愈斬鬼丹治鬼胎如抱一甕吳茱萸川烏秦艽柴胡白殭蠶上為末煉蜜丸桐子大每服七丸酒下取去惡物即愈彭祖接命丹大附子重二兩三錢一個或一兩六錢亦可切薄片用夏布包定甘草二兩甘遂二兩二味捶碎上以燒酒二斤共浸半日文武火煮酒干為度取起附子甘草甘遂不用加麝香三分捶千下作二丸陰乾一丸填臍內七日一換放黑鉛盒內養之此丹暖丹田助兩腎添補髓卻病久固返老還童延年益壽還元丹安五臟消百病此藥大能令瘦者肥補虛損實精髓固元氣黃牛肉不拘多少去筋膜切作棋子大片用河水洗數遍令血味盡仍浸一日次日再洗水清為度用無灰好酒入壇內重泥封固用桑柴文武火煮一晝夜取出焙乾為末如黃沙為佳焦黑無用每末半斤入山藥四兩重加蔥鹽炒去蔥鹽為末白茯苓四兩堅實者蓮子四兩去心蔥鹽炒小茴香二兩上去枝梗微炒香共研為末和勻用紅棗不拘多少湯藥大爛皮肉相離核研為膏加好酒入前藥丸如桐子大空心溫酒下五十丸初服日進三丸久則一服如彈子大每日好酒空心細嚼一丸芙蓉散治室女無夫者思欲動火以致胸痛自汗頰出脈亂芙蓉花有花帶花有子帶子採一朵搗爛和井水濾去渣服之立效開聰明方荷花梗曬乾為末同何首烏滾水沖服當茶久則令聰明雖至愚者亦心靈生慧也長髮方羊屎不拘多少納鯽魚腹中用瓦缶固濟灰和香油塗發數日發漸長而黑矣長鬚方鹿角尖鎊細二錢皂角刺二錢牙皂二錢橄欖煅灰存性四兩酸橘子一枚取汁生薑取汁上二味取汁二兩二錢和勻入磁器內收貯用柳木塞口重湯煮三炷香聽用每日晚間以肥皂水洗淨短鬚上藥擦之天明洗去至四十九日長尺余如欲再長則再擦時每日吃胡桃一個至二七日吃胡桃二個三七日吃胡桃三個為例拔毒異法鐵屑研細以好醋調之煎二三沸撈取鐵屑鋪患處將上好磁石一大塊頻頻吸之即其毒自出也治諸毒不收口生鉛三分敲成薄片剪如香茶樣分三服每日用鉛一分拌核桃肉嚼好酒送下三日服完收口大便內出毒物而愈壬子丸依方修合服之不過半月而有孕吳茱萸白及白蘞白茯苓各一兩牛膝細辛各五錢菖蒲白附子當歸各少許厚朴桂心人參各四兩乳香三兩沒藥四兩上共為末煉蜜丸如梧子大每服十丸有效若男子服補益若孕婦服即生雙胎空心好酒下用壬子日修合勿令雞犬婦人見內府磁壺酒天仙子六雙野菊花三千朵陳皮八兩泔水浸製去白甘草四兩去皮貫眾三兩川烏十枚用草果以川烏末入草果殼內放飯上蒸熟去草果以上六味共為丸聽用鹿茸羊油炙庵閭子冬青子沙苑蒺藜各一兩晚蠶蛾十對新瓦炙成對者蛤蚧一對全尾酒浸各用一兩以上六味為末炙為末聽用造麴用杏仁去皮尖良薑砂仁半開紫荊花川椒肉桂五加皮紫梢花各一兩為末上以飛面二斤半米湯合為丸如圓眼大放不見日陰乾聽用糯米一升煮爛粥用天仙子六味末用曲五兩和勻入瓶封固七日成酒取出又入鹿茸等六味與酒拌和一處如干加酥油與蜜為丸如圓眼大金箔為衣每一丸入磁壺內滾水一盞化開成酒服
